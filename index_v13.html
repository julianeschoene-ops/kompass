<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kompass</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e6e8f0;--soft:#eef2ff;--shadow:0 10px 30px rgba(16,24,40,.08);--blue:#4f8cff;--red:#ef5b5b;--yellow:#f3c64e;--violet:#8b5cf6;--green:#34c779;--good:#d9f7e8;--mid:#fff3c4;--bad:#ffe0df}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}aside{background:white;padding:24px;border-right:1px solid var(--line);height:100vh;position:sticky;top:0}.logo{font-size:32px;font-weight:900}.sub{color:var(--muted);margin:4px 0 18px}.role{border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:18px;background:#fafbff}.role select{width:100%;border:0;background:transparent;font-weight:800}.nav button{display:block;width:100%;padding:14px;border:0;background:transparent;text-align:left;border-radius:14px;margin:4px 0}.nav button.active{background:var(--soft);font-weight:800;color:#3142aa}main{padding:28px;max-width:1500px}h1{font-size:34px;margin:0 0 8px}.hint{color:var(--muted);margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.card{background:white;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}.tile{text-align:left;cursor:pointer;min-height:110px}.tile b{font-size:21px;display:block;margin-bottom:8px}.tile span,.card p{color:var(--muted);line-height:1.45}.section{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:28px 0 10px}.klasse{color:white;border:0}.a{background:var(--blue)}.b{background:var(--red)}.c{background:var(--yellow);color:#4b3b00}.d{background:var(--violet)}.e{background:var(--green)}.students{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px}.mini{font-size:13px;color:var(--muted)}.chip{display:inline-block;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 14px;margin:0 8px 12px 0;cursor:pointer}.chip.dark{background:#172033;color:white}.matrixwrap{overflow:auto}table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:980px}th{color:#667085;font-size:13px;padding:8px;text-align:center}th:first-child{text-align:left}td{background:white;padding:10px;border-top:1px solid #f0f1f6;border-bottom:1px solid #f0f1f6}td:first-child{font-weight:750;border-radius:14px 0 0 14px;min-width:290px}td:last-child{border-radius:0 14px 14px 0}.status{width:42px;height:42px;border-radius:14px;border:2px solid #e5e7ef;background:#f2f4f7;margin:0 2px;font-weight:900}.greenbtn.on{background:var(--good);border-color:#55d49a;color:#087443}.yellowbtn.on{background:var(--mid);border-color:#f2c94c;color:#946200}.redbtn.on{background:var(--bad);border-color:#f97066;color:#b42318}.present.on{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.effort.on{background:#ede9fe;border-color:#a78bfa;color:#6d28d9}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;margin:6px 0 12px;font:inherit}label{font-weight:800}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.toast{position:fixed;right:20px;bottom:20px;background:#172033;color:white;border-radius:999px;padding:14px 18px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:900px){.app{display:block}aside{display:none}main{padding:18px 14px}.grid,.grid5,.formgrid{grid-template-columns:1fr}.students{grid-template-columns:1fr 1fr}h1{font-size:29px}}
</style></head><body><div id="root"></div><div id="toast" class="toast">Gespeichert</div>
<script>
let view='start',role='Stufenleitung',subject=null,pupil=null,klasse=null,year=null,showForm=false;
const pupils=[['david','David N.','David Navaratnam','5d','d','Juliane'],['noah','Noah M.','Noah Müller','5a','a','Nicole'],['anna','Anna K.','Anna Keller','5b','b','Dagmar'],['lea','Lea S.','Lea Schneider','5c','c','Peter'],['mira','Mira T.','Mira Tuna','5e','e','Julia'],['max','Max W.','Max Weber','5d','d','Juliane'],['lina','Lina F.','Lina Fischer','5d','d','Juliane'],['tim','Tim B.','Tim Becker','5a','a','Nicole']];
let subjects={'Englisch':['Kernfächer','kompetenz',{'Grammatik':['Simple Present anwenden','Fragen bilden'],'Schreiben':['Über Alltag schreiben']}],'WBS':['Werkstatt','kompetenz',{'Wirtschaft':['Kostenarten unterscheiden','Diagramme analysieren']}],'Biologie':['Werkstatt','kompetenz',{'Naturwissenschaftlich arbeiten':['Versuche beschreiben']}],'Technik':['Werkstatt','kompetenz',{'Sicherheit':['Werkzeuge sicher nutzen']}],'Gitarre':['Clubs','teilnahme',{'Teilnahme & Engagement':['anwesend','engagiert mitgearbeitet','Material dabei']}],'Garten':['Kreativband/Labore','teilnahme',{'Teilnahme & Engagement':['anwesend','engagiert mitgearbeitet'],'optional Kompetenz':['Werkzeuge verantwortungsvoll nutzen']}],'Robotik':['Kreativband/Labore','mixed',{'Teilnahme & Engagement':['anwesend','engagiert mitgearbeitet'],'optional Kompetenz':['Sensoren testen','Roboter steuern']}]} ;
let ratings=JSON.parse(localStorage.getItem('kompass_ratings_v13')||'{}'), attendance=JSON.parse(localStorage.getItem('kompass_att_v13')||'{}');
function key(c,p){return c+'|'+p}function save(){localStorage.setItem('kompass_ratings_v13',JSON.stringify(ratings));localStorage.setItem('kompass_att_v13',JSON.stringify(attendance))}function mark(store,c,p,v){store[key(c,p)]=v;save();toast();render()}function toast(){let t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),850)}
function shell(c){root.innerHTML='<div class="app"><aside><div class="logo">Kompass</div><div class="sub">Online-Demo · v1.3</div><div class="role"><div class="mini">Rolle</div><select onchange="role=this.value;render()"><option '+sel('Lehrkraft')+'>Lehrkraft</option><option '+sel('Stufenleitung')+'>Stufenleitung</option><option '+sel('Admin')+'>Admin</option></select></div><div class="nav">'+nav('start','Start')+nav('years','Jahrgänge')+nav('students','Schülerdatenbank')+nav('matrix','Dokumentation')+nav('catalog','Kompetenzkatalog')+nav('reports','Auswertungen')+'</div></aside><main>'+c+'</main></div>'}
function sel(x){return role==x?'selected':''}function nav(v,t){if(v=='catalog'&&role=='Lehrkraft')return '';return '<button class="'+(view==v?'active':'')+'" onclick="go(\''+v+'\')">'+t+'</button>'}function go(v){view=v;subject=null;pupil=null;klasse=null;year=null;showForm=false;render()}function head(t,h){return '<h1>'+t+'</h1><div class="hint">'+h+'</div>'}
function render(){if(view=='start')start();if(view=='years')years();if(view=='students')students();if(view=='matrix')matrix();if(view=='catalog')catalog();if(view=='reports')reports()}
function start(){shell(head('Hallo Juliane','Kompass trennt Kompetenzbewertung und Teilnahme/Engagement in Clubs und Kreativband.')+'<div class="grid"><button class="card tile" onclick="go(\'matrix\')"><b>Dokumentation</b><span>Kompetenzen oder Teilnahme je nach Lernbereich.</span></button><button class="card tile" onclick="go(\'catalog\')"><b>Kompetenz anlegen</b><span>Für Stufenleitung und Admin.</span></button><button class="card tile" onclick="go(\'years\')"><b>Jahrgänge 5–10</b><span>Jetzt klickbar.</span></button></div><div class="section">Klassenfarben</div>'+classgrid(5))}
function classgrid(y){return '<div class="grid5">'+['a','b','c','d','e'].map((x,i)=>'<button class="card tile klasse '+x+'" onclick="klasse=\''+y+x+'\';view=\'students\';render()"><b>'+y+x+'</b><span>'+['Blau','Rot','Gelb','Violett','Grün'][i]+'</span></button>').join('')+'</div>'}
function years(){if(year){shell(head('Jahrgang '+year,'Klassenübersicht mit euren Farben.')+'<button class="chip" onclick="year=null;render()">← Jahrgänge</button>'+classgrid(year));return}let h=head('Jahrgänge','Jahrgänge sind jetzt klickbar.')+'<div class="grid">';for(let y=5;y<=10;y++)h+='<button class="card tile" onclick="year='+y+';render()"><b>Jahrgang '+y+'</b><span>Klassen und Lerngruppen öffnen</span></button>';shell(h+'</div>')}
function filtered(){return klasse?pupils.filter(p=>p[3]==klasse):pupils}
function students(){shell(head(klasse?'Klasse '+klasse:'Schülerdatenbank','Kurznamen, Klassenfarben und Lernprofile.')+(klasse?'<button class="chip" onclick="klasse=null;render()">alle anzeigen</button>':'')+'<div class="students">'+filtered().map(p=>'<div class="card"><span class="dot '+p[4]+'"></span><b>'+p[1]+'</b><p>'+p[3]+' · Lerncoach: '+p[5]+'</p></div>').join('')+'</div>')}
function matrix(){if(!subject){let h=head('Dokumentation','Kernfächer/Werkstatt: Kompetenzen. Kreativband/Clubs: Teilnahme und Engagement, optional Kompetenzen.');['Kernfächer','Werkstatt','Kreativband/Labore','Clubs'].forEach(g=>{h+='<div class="section">'+g+'</div><div class="grid">'+Object.keys(subjects).filter(s=>subjects[s][0]==g).map(s=>'<button class="card tile" onclick="subject=\''+s+'\';render()"><b>'+s+'</b><span>'+labelMode(subjects[s][1])+'</span></button>').join('')+'</div>'});shell(h);return}let mode=subjects[subject][1],areas=subjects[subject][2],h=head(subject,labelMode(mode))+'<button class="chip" onclick="subject=null;render()">← Übersicht</button><span class="chip dark">'+subjects[subject][0]+'</span>';Object.keys(areas).forEach(a=>{h+='<div class="card"><h2>'+a+'</h2><div class="matrixwrap"><table><tr><th>'+((mode=='kompetenz'||a.includes('Kompetenz'))?'Kompetenz':'Eintrag')+'</th>'+pupils.map(p=>'<th><span class="dot '+p[4]+'"></span><br>'+p[1]+'</th>').join('')+'</tr>';areas[a].forEach(c=>h+='<tr><td>'+c+'</td>'+pupils.map(p=>modeCell(c,p[0],mode,a)).join('')+'</tr>');h+='</table></div></div>'});shell(h)}
function labelMode(m){return m=='kompetenz'?'Kompetenzbewertung':m=='teilnahme'?'Teilnahme · Engagement':'Teilnahme + optionale Kompetenzen'}
function modeCell(c,p,m,a){if(m=='kompetenz'||a.includes('Kompetenz')) return compCell(c,p);let v=attendance[key(c,p)]||'';return '<td><button class="status present '+(v=='anwesend'?'on':'')+'" onclick="mark(attendance,\''+c+'\',\''+p+'\',\'anwesend\')">✓</button><button class="status effort '+(v=='engagiert'?'on':'')+'" onclick="mark(attendance,\''+c+'\',\''+p+'\',\'engagiert\')">★</button></td>'}
function compCell(c,p){let v=ratings[key(c,p)]||'';return '<td><button class="status greenbtn '+(v=='g'?'on':'')+'" onclick="mark(ratings,\''+c+'\',\''+p+'\',\'g\')">●</button><button class="status yellowbtn '+(v=='y'?'on':'')+'" onclick="mark(ratings,\''+c+'\',\''+p+'\',\'y\')">●</button><button class="status redbtn '+(v=='r'?'on':'')+'" onclick="mark(ratings,\''+c+'\',\''+p+'\',\'r\')">●</button></td>'}
function catalog(){if(role=='Lehrkraft'){shell(head('Kein Zugriff','Kompetenzen anlegen/bearbeiten ist für Stufenleitung und Admin vorgesehen.'));return}let h=head('Kompetenzkatalog','Hier legst du Kompetenzen an oder bearbeitest vorhandene Einträge.')+'<button class="chip dark" onclick="showForm=!showForm;render()">+ Kompetenz anlegen</button>';if(showForm)h+=form();Object.keys(subjects).forEach(s=>h+='<div class="card"><h2>'+s+'</h2><p>'+subjects[s][0]+' · '+labelMode(subjects[s][1])+' · Bereiche: '+Object.keys(subjects[s][2]).join(', ')+'</p><button class="chip" onclick="alert(\'Bearbeiten-Demo: In der echten Version öffnet sich hier ein Formular.\')">Bearbeiten</button></div>');shell(h)}
function form(){return '<div class="card"><h2>Neue Kompetenz / neuer Eintrag</h2><div class="formgrid"><div><label>Fach/Lernbereich</label><select id="f">'+Object.keys(subjects).map(s=>'<option>'+s+'</option>').join('')+'</select></div><div><label>Bereich</label><input id="b" value="Neuer Bereich"></div></div><label>Text</label><textarea id="t">Ich kann ...</textarea><button class="chip dark" onclick="addCompetency()">Speichern</button></div>'}
function addCompetency(){let f=document.getElementById('f').value,b=document.getElementById('b').value,t=document.getElementById('t').value;if(!subjects[f][2][b])subjects[f][2][b]=[];subjects[f][2][b].push(t);showForm=false;toast();render()}
function reports(){shell(head('Auswertungen','Überblick für Stufenleitung, Fachschaften und LEG.')+'<div class="grid"><div class="card"><h2>Englisch</h2><p>72 % bewertet</p></div><div class="card"><h2>Werkstatt</h2><p>64 % bewertet</p></div><div class="card"><h2>Clubs/Kreativband</h2><p>Teilnahme und Engagement separat sichtbar.</p></div></div>')}
render()
</script></body></html>
