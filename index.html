<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOMPASS 3.0</title>
<style>
:root{
--bg:#f5f7fb;--card:#fff;--ink:#14213d;--muted:#667085;--line:#dfe7f2;--nav:#0b2545;--active:#e6f2ed;
--shadow:0 14px 34px rgba(18,36,72,.09);
--blue:#4f8cff;--red:#ef5b5b;--yellow:#f3c64e;--violet:#8b5cf6;--green:#34c779;
--ok:#d9f7e8;--mid:#fff3c4;--bad:#ffe0df;--note:#fff8dd;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}
aside{background:var(--nav);color:white;padding:24px;position:sticky;top:0;height:100vh}
.brand{font-size:30px;font-weight:900;letter-spacing:.08em}.sub{color:#c8d8ed;margin:8px 0 22px;font-size:14px}
.userbox{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:12px;margin-bottom:18px}
.userbox label{font-size:12px;color:#c8d8ed}.userbox select{width:100%;border:0;background:transparent;color:white;font-weight:800;margin:3px 0 10px}.userbox option{color:#111}
.nav button{width:100%;border:0;background:transparent;color:white;text-align:left;padding:14px 16px;border-radius:16px;margin:4px 0;font-size:16px;cursor:pointer}
.nav button.active{background:var(--active);color:#0b2545;font-weight:850}
main{padding:28px;max-width:1560px;width:100%}
h1{font-size:34px;margin:0 0 8px}.hint{color:var(--muted);margin-bottom:22px}.topline{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.card,.tile{background:white;border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow)}
.tile{text-align:left;cursor:pointer;min-height:112px}.tile b{font-size:21px;display:block;margin-bottom:8px}.tile span,.card p{color:var(--muted);line-height:1.45}
.section{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:26px 0 10px}
.a{background:var(--blue)}.b{background:var(--red)}.c{background:var(--yellow);color:#4b3b00}.d{background:var(--violet)}.e{background:var(--green)}
.klasse{color:white;border:0}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px}
.mini{font-size:13px;color:var(--muted)}.list{display:grid;gap:10px}.row{background:white;border:1px solid var(--line);border-radius:18px;padding:15px;display:flex;justify-content:space-between;gap:12px;align-items:center}
.chip{display:inline-block;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 14px;margin:0 8px 12px 0;cursor:pointer}.chip.active,.chip.dark{background:#14213d;color:white;border-color:#14213d}.chip.note{background:var(--note)}
.students{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.status{width:44px;height:44px;border-radius:15px;border:2px solid #d7e0ee;background:#f7f9fc;margin:0 2px;font-weight:900;cursor:pointer}
.status.green.on{background:var(--ok);border-color:#55d49a;color:#087443}.status.yellow.on{background:var(--mid);border-color:#f2c94c;color:#946200}.status.red.on{background:var(--bad);border-color:#f97066;color:#b42318}.status.present.on{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.status.effort.on{background:#ede9fe;border-color:#a78bfa;color:#6d28d9}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px;margin:6px 0 12px;font:inherit;background:#fff}textarea{min-height:76px}label{font-weight:800}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.path{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}.path span{background:#eef4fb;border:1px solid var(--line);border-radius:999px;padding:8px 12px;color:#53627a}
.profile{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 18px;text-align:center;min-width:94px}.stat b{font-size:25px;display:block}
.noteBox{background:var(--note);border:1px solid #ffe8a3;border-radius:14px;padding:10px;margin-top:10px;color:#765400}.historyline{border-left:3px solid #dfe7f2;padding:8px 0 8px 14px;color:var(--muted)}
.toolbar{background:white;border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.toast{position:fixed;right:22px;bottom:22px;background:#14213d;color:#fff;border-radius:999px;padding:14px 18px;opacity:0;transition:.2s;box-shadow:var(--shadow)}.toast.show{opacity:1}
@media(max-width:900px){.app{display:block}aside{display:none}main{padding:18px 14px}.grid,.grid2,.grid4,.grid5,.formgrid,.profile{grid-template-columns:1fr}.students{grid-template-columns:1fr 1fr}h1{font-size:29px}}
</style>
</head>
<body>
<div id="root"></div><div id="toast" class="toast">Gespeichert</div>
<script>
let view='dashboard',role='Stufenleitung',teacher='Juliane';
let selectedLearning=null,selectedSubject=null,selectedArea=null,selectedComp=null,sprint=1;
let year=null,klasse=null,pupilId=null,showStudentForm=false,editPupilId=null,showCompForm=false,editCompId=null,noteTarget=null;

const seedPupils=[
{id:'david',short:'David N.',full:'David Navaratnam',className:'5d',color:'d',coach:'Juliane',level:'M'},
{id:'noah',short:'Noah M.',full:'Noah Müller',className:'5a',color:'a',coach:'Nicole',level:'G'},
{id:'anna',short:'Anna K.',full:'Anna Keller',className:'5b',color:'b',coach:'Dagmar',level:'M'},
{id:'lea',short:'Lea S.',full:'Lea Schneider',className:'5c',color:'c',coach:'Peter',level:'E'},
{id:'mira',short:'Mira T.',full:'Mira Tuna',className:'5e',color:'e',coach:'Julia',level:'G'},
{id:'max',short:'Max W.',full:'Max Weber',className:'6d',color:'d',coach:'Juliane',level:'M'},
{id:'lina',short:'Lina F.',full:'Lina Fischer',className:'7d',color:'d',coach:'Juliane',level:'E'},
{id:'tim',short:'Tim B.',full:'Tim Becker',className:'5a',color:'a',coach:'Nicole',level:'G'}
];

const seedEntries=[
{id:'eng_g1',learning:'Kernfächer',sprint:null,subject:'Englisch',area:'Grammatik',level:'G/M/E',type:'kompetenz',text:'Simple Present anwenden'},
{id:'eng_s1',learning:'Kernfächer',sprint:null,subject:'Englisch',area:'Schreiben',level:'G/M/E',type:'kompetenz',text:'Über Alltag schreiben'},
{id:'de_l1',learning:'Kernfächer',sprint:null,subject:'Deutsch',area:'Lesen',level:'G/M/E',type:'kompetenz',text:'Sachtexten Informationen entnehmen'},
{id:'ma_d1',learning:'Kernfächer',sprint:null,subject:'Mathematik',area:'Daten',level:'G/M/E',type:'kompetenz',text:'Diagramme lesen'},
{id:'wbs1_chart',learning:'Werkstatt',sprint:1,subject:'WBS',area:'Wirtschaft',level:'G/M/E',type:'kompetenz',text:'Diagramme analysieren'},
{id:'wbs1_cost',learning:'Werkstatt',sprint:1,subject:'WBS',area:'Wirtschaft',level:'alle',type:'kompetenz',text:'Kostenarten unterscheiden'},
{id:'geo1_map',learning:'Werkstatt',sprint:1,subject:'Geografie',area:'Räume analysieren',level:'alle',type:'kompetenz',text:'Karten Informationen entnehmen'},
{id:'bio2_exp',learning:'Werkstatt',sprint:2,subject:'Biologie',area:'Naturwissenschaftlich arbeiten',level:'alle',type:'kompetenz',text:'Versuche beschreiben'},
{id:'tech3_safe',learning:'Werkstatt',sprint:3,subject:'Technik',area:'Sicherheit',level:'alle',type:'kompetenz',text:'Werkzeuge sicher nutzen'},
{id:'aes4_food',learning:'Werkstatt',sprint:4,subject:'AES',area:'Praxis',level:'alle',type:'kompetenz',text:'Arbeitsabläufe planen'},
{id:'kb_garden_att',learning:'Kreativband/Labore',sprint:null,subject:'Garten',area:'Teilnahme',level:'-',type:'teilnahme',text:'war anwesend'},
{id:'kb_garden_eff',learning:'Kreativband/Labore',sprint:null,subject:'Garten',area:'Engagement',level:'-',type:'engagement',text:'hat engagiert mitgearbeitet'},
{id:'kb_robot_comp',learning:'Kreativband/Labore',sprint:null,subject:'Robotik',area:'optionale Kompetenz',level:'alle',type:'kompetenz',text:'Sensoren testen'},
{id:'club_guitar_att',learning:'Clubs',sprint:null,subject:'Gitarre',area:'Teilnahme',level:'-',type:'teilnahme',text:'war da'},
{id:'club_guitar_eff',learning:'Clubs',sprint:null,subject:'Gitarre',area:'Engagement',level:'-',type:'engagement',text:'hat regelmäßig geübt / sich eingebracht'}
];

let pupils=JSON.parse(localStorage.getItem('kompass30_pupils')||'null')||seedPupils;
let entries=JSON.parse(localStorage.getItem('kompass30_entries')||'null')||seedEntries;
let records=JSON.parse(localStorage.getItem('kompass30_records')||'{}');

function persist(){localStorage.setItem('kompass30_pupils',JSON.stringify(pupils));localStorage.setItem('kompass30_entries',JSON.stringify(entries));localStorage.setItem('kompass30_records',JSON.stringify(records))}
function today(){return new Date().toLocaleDateString('de-DE')}
function canEdit(){return role==='Stufenleitung'||role==='Admin'}
function recKey(c,p){return c+'|'+p}
function setRecord(c,p,value,context='Bewertung'){let k=recKey(c,p),r=records[k]||{current:null,firstGreen:null,history:[],notes:[]};r.current=value;if(value==='green'&&!r.firstGreen)r.firstGreen=today();r.history.push({date:today(),value,teacher,context});records[k]=r;persist();toast();render()}
function addNote(c,p,note,context='Notiz'){let k=recKey(c,p),r=records[k]||{current:null,firstGreen:null,history:[],notes:[]};r.notes.push({date:today(),teacher,context,note});records[k]=r;persist();toast();noteTarget=null;render()}
function toast(){let t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),850)}

function shell(content){
root.innerHTML='<div class="app"><aside><div class="brand">KOMPASS</div><div class="sub">Arbeitsoberfläche · Version 3.0</div><div class="userbox"><label>Rolle</label><select onchange="role=this.value;render()"><option '+sel(role,'Lehrkraft')+'>Lehrkraft</option><option '+sel(role,'Stufenleitung')+'>Stufenleitung</option><option '+sel(role,'Admin')+'>Admin</option></select><label>Lehrkraft</label><select onchange="teacher=this.value;render()"><option '+sel(teacher,'Juliane')+'>Juliane</option><option '+sel(teacher,'Kollege Geo')+'>Kollege Geo</option><option '+sel(teacher,'Nicole')+'>Nicole</option></select></div><div class="nav">'+nav('dashboard','Dashboard')+nav('lernen','Lernen')+nav('werkstatt','Werkstatt')+nav('kreativ','Kreativband')+nav('clubs','Clubs')+nav('students','Schüler')+nav('admin','Verwaltung')+nav('development','Entwicklung')+'</div></aside><main>'+content+'</main></div>';
}
function sel(a,b){return a===b?'selected':''}
function nav(v,t){if(v==='admin'&&!canEdit())return '';return '<button class="'+(view===v?'active':'')+'" onclick="go(\\''+v+'\\')">'+t+'</button>'}
function go(v){view=v;selectedLearning=null;selectedSubject=null;selectedArea=null;selectedComp=null;year=null;klasse=null;pupilId=null;noteTarget=null;showStudentForm=false;editPupilId=null;showCompForm=false;editCompId=null;render()}
function head(t,h){return '<div class="topline"><div><h1>'+t+'</h1><div class="hint">'+h+'</div></div><div class="mini">Jahrgänge 5–7 · Krankmeldungen bleiben in IServ</div></div>'}
function render(){({dashboard,lernen,werkstatt,kreativ,clubs,students,admin,development}[view]||dashboard)()}

function dashboard(){
let open=Object.values(records).reduce((a,r)=>a+r.history.length,0);
shell(head('Dashboard','Arbeitsoberfläche für Kompetenzentwicklung, Werkstatt, Kreativband und Clubs.')+
'<div class="grid"><button class="tile" onclick="go(\\'werkstatt\\')"><b>Werkstatt heute</b><span>Sprint '+sprint+' · WBS / Geografie / Bio / Technik erfassen</span></button><button class="tile" onclick="go(\\'kreativ\\')"><b>Kreativband</b><span>Anwesenheit, Engagement, optionale Kompetenzen</span></button><button class="tile" onclick="go(\\'clubs\\')"><b>Clubs</b><span>Teilnahme, Engagement, Hinweise</span></button></div>'+
'<div class="section">Schnellzugriffe</div><div class="grid"><button class="tile" onclick="go(\\'lernen\\')"><b>Kernfächer</b><span>Fach → Bereich → Kompetenz → SuS</span></button><button class="tile" onclick="go(\\'students\\')"><b>Schülerdatenbank</b><span>Profile, Stammdaten, Verlauf</span></button><button class="tile" onclick="go(\\'admin\\')"><b>Verwaltung</b><span>Einträge und Kompetenzen bearbeiten</span></button></div>'+
'<div class="section">Status</div><div class="grid"><div class="card"><h2>'+pupils.length+'</h2><p>Schüler*innen in Jahrgang 5–7</p></div><div class="card"><h2>'+entries.length+'</h2><p>Einträge im Katalog</p></div><div class="card"><h2>'+open+'</h2><p>gespeicherte Bewertungen</p></div></div>');
}

function lernen(){selectedLearning='Kernfächer';flow(head('Lernen','Kernfächer: Fach → Bereich → Kompetenz → Schüler*innen bewerten.'))}
function werkstatt(){selectedLearning='Werkstatt';let top=head('Werkstatt','Fünf Sprints mit jeweils unterschiedlichen Kompetenzen in den Fächern.')+'<div class="toolbar">'+[1,2,3,4,5].map(n=>'<button class="chip '+(sprint===n?'active':'')+'" onclick="sprint='+n+';selectedSubject=null;selectedArea=null;selectedComp=null;render()">Sprint '+n+'</button>').join('')+'</div>';flow(top)}
function kreativ(){selectedLearning='Kreativband/Labore';flow(head('Kreativband','Anwesenheit und Engagement stehen im Vordergrund. Optionale Kompetenzen und Notizen sind möglich.'))}
function clubs(){selectedLearning='Clubs';flow(head('Clubs','Teilnahme, Engagement, Hinweise und ggf. Zertifikate/Produkte.'))}

function currentEntries(){return entries.filter(e=>e.learning===selectedLearning&&(selectedLearning!=='Werkstatt'||e.sprint===sprint))}
function flow(prefix){
let arr=currentEntries();let h=prefix+breadcrumb();
if(!selectedSubject){let subs=[...new Set(arr.map(e=>e.subject))];h+='<div class="section">1. Fach oder Angebot wählen</div><div class="grid">'+subs.map(s=>'<button class="tile" onclick="selectedSubject=\\''+s+'\\';render()"><b>'+s+'</b><span>'+arr.filter(e=>e.subject===s).length+' Einträge</span></button>').join('')+'</div>';shell(h);return}
let subArr=arr.filter(e=>e.subject===selectedSubject);
if(!selectedArea){let areas=[...new Set(subArr.map(e=>e.area))];h+='<div class="section">2. Bereich wählen</div><div class="grid">'+areas.map(a=>'<button class="tile" onclick="selectedArea=\\''+a+'\\';render()"><b>'+a+'</b><span>'+subArr.filter(e=>e.area===a).length+' Einträge</span></button>').join('')+'</div>';shell(h);return}
let areaArr=subArr.filter(e=>e.area===selectedArea);
if(!selectedComp){h+='<div class="section">3. Eintrag wählen</div><div class="list">'+areaArr.map(e=>'<div class="row"><div><b>'+e.text+'</b><div class="mini">'+meta(e)+'</div></div><button class="chip dark" onclick="selectedComp=\\''+e.id+'\\';render()">Erfassen</button></div>').join('')+'</div>';shell(h);return}
let e=areaArr.find(x=>x.id===selectedComp);h+=assess(e);shell(h);
}
function breadcrumb(){let p=[];if(selectedLearning)p.push(selectedLearning);if(selectedLearning==='Werkstatt')p.push('Sprint '+sprint);if(selectedSubject)p.push(selectedSubject);if(selectedArea)p.push(selectedArea);return '<div class="path">'+p.map(x=>'<span>'+x+'</span>').join('')+'</div><button class="chip" onclick="selectedSubject=null;selectedArea=null;selectedComp=null;render()">zurück</button>'}
function meta(e){return e.learning+' · '+(e.sprint?'Sprint '+e.sprint+' · ':'')+e.subject+' · '+e.area+' · Niveau: '+e.level+' · '+e.type}
function assess(e){return '<div class="section">4. Schüler*innen erfassen</div><div class="card"><h2>'+e.text+'</h2><p>'+meta(e)+' · Lehrkraft: <b>'+teacher+'</b></p></div><div class="students">'+pupils.map(p=>pupilCell(e,p)).join('')+'</div>'}
function pupilCell(e,p){let r=records[recKey(e.id,p.id)]||{};let buttons=e.type==='kompetenz'?'<button class="status green '+(r.current==='green'?'on':'')+'" onclick="setRecord(\\''+e.id+'\\',\\''+p.id+'\\',\\'green\\',\\''+e.learning+' '+e.subject+'\\')">●</button><button class="status yellow '+(r.current==='yellow'?'on':'')+'" onclick="setRecord(\\''+e.id+'\\',\\''+p.id+'\\',\\'yellow\\',\\''+e.learning+' '+e.subject+'\\')">●</button><button class="status red '+(r.current==='red'?'on':'')+'" onclick="setRecord(\\''+e.id+'\\',\\''+p.id+'\\',\\'red\\',\\''+e.learning+' '+e.subject+'\\')">●</button>':'<button class="status present '+(r.current==='present'?'on':'')+'" onclick="setRecord(\\''+e.id+'\\',\\''+p.id+'\\',\\'present\\',\\''+e.learning+' '+e.subject+'\\')">✓</button><button class="status effort '+(r.current==='effort'?'on':'')+'" onclick="setRecord(\\''+e.id+'\\',\\''+p.id+'\\',\\'effort\\',\\''+e.learning+' '+e.subject+'\\')">★</button>';let note=noteTarget===e.id+'|'+p.id?'<textarea id="noteText" placeholder="Notiz hinzufügen..."></textarea><button class="chip dark" onclick="addNote(\\''+e.id+'\\',\\''+p.id+'\\',document.getElementById(\\'noteText\\').value,\\''+e.learning+' '+e.subject+'\\')">Notiz speichern</button>':'<button class="chip note" onclick="noteTarget=\\''+e.id+'|'+p.id+'\\';render()">Notiz</button>';return '<div class="card"><span class="dot '+p.color+'"></span><b>'+p.short+'</b><p>'+p.className+' · '+p.level+'</p>'+buttons+'<div class="mini">'+(r.history?.length||0)+' Bewertungen · '+(r.notes?.length||0)+' Notizen</div>'+note+'</div>'}

function students(){
if(pupilId){studentProfile();return}
let list=pupils.filter(p=>!year||p.className[0]==year).filter(p=>!klasse||p.className===klasse);
let h=head(year?'Schüler · Jahrgang '+year:'Schüler','Schülerdatenbank für Jahrgänge 5–7.')+'<div class="toolbar">'+[5,6,7].map(y=>'<button class="chip '+(year==y?'active':'')+'" onclick="year='+y+';render()">Jahrgang '+y+'</button>').join('')+'<button class="chip" onclick="year=null;klasse=null;render()">alle</button></div>';
if(year)h+='<div class="grid5">'+['a','b','c','d','e'].map(k=>'<button class="tile klasse '+k+'" onclick="klasse=\\''+year+k+'\\';render()"><b>'+year+k+'</b></button>').join('')+'</div>';
if(canEdit())h+='<div class="section">Bearbeiten</div><button class="chip dark" onclick="showStudentForm=!showStudentForm;editPupilId=null;render()">+ Schüler*in anlegen</button>';
if(showStudentForm)h+=studentForm();
h+='<div class="section">Liste</div><div class="students">'+list.map(p=>'<div class="card"><span class="dot '+p.color+'"></span><b>'+p.short+'</b><p>'+p.className+' · Coach: '+p.coach+' · Niveau: '+p.level+'</p><button class="chip" onclick="pupilId=\\''+p.id+'\\';render()">Profil</button>'+(canEdit()?'<button class="chip" onclick="editPupilId=\\''+p.id+'\\';showStudentForm=true;render()">Bearbeiten</button>':'')+'</div>').join('')+'</div>';
shell(h);
}
function studentForm(){let p=editPupilId?pupils.find(x=>x.id===editPupilId):{full:'Neue Schülerin',short:'Neue S.',className:'5d',coach:'Juliane',level:'G'};return '<div class="card"><h2>'+(editPupilId?'Schüler*in bearbeiten':'Schüler*in anlegen')+'</h2><div class="formgrid"><div><label>Voller Name</label><input id="sf_full" value="'+p.full+'"></div><div><label>Kurzname</label><input id="sf_short" value="'+p.short+'"></div><div><label>Klasse</label><select id="sf_class">'+[5,6,7].flatMap(y=>['a','b','c','d','e'].map(k=>''+y+k)).map(k=>'<option '+sel(p.className,k)+'>'+k+'</option>').join('')+'</select></div><div><label>Niveau</label><select id="sf_level"><option '+sel(p.level,'G')+'>G</option><option '+sel(p.level,'M')+'>M</option><option '+sel(p.level,'E')+'>E</option></select></div><div><label>Lerncoach</label><input id="sf_coach" value="'+p.coach+'"></div></div><button class="chip dark" onclick="saveStudent()">Speichern</button></div>'}
function saveStudent(){let cls=sf_class.value;if(editPupilId){let p=pupils.find(x=>x.id===editPupilId);p.full=sf_full.value;p.short=sf_short.value;p.className=cls;p.color=cls.slice(-1);p.coach=sf_coach.value;p.level=sf_level.value}else{pupils.push({id:'s'+Date.now(),full:sf_full.value,short:sf_short.value,className:cls,color:cls.slice(-1),coach:sf_coach.value,level:sf_level.value})}showStudentForm=false;editPupilId=null;persist();toast();render()}
function studentProfile(){let p=pupils.find(x=>x.id===pupilId);let hist=Object.entries(records).filter(([k,r])=>k.endsWith('|'+p.id));shell(head(p.short,'Profil · '+p.className+' · Coach: '+p.coach)+'<button class="chip" onclick="pupilId=null;render()">zurück</button><div class="profile"><div class="card"><h2>'+p.full+'</h2><p>Niveau: '+p.level+'</p><div class="list">'+(hist.length?hist.map(([k,r])=>historyRow(k,r)).join(''):'<p>Noch keine Einträge.</p>')+'</div></div><div class="card"><h2>Status</h2><div class="stats"><div class="stat"><b>'+hist.filter(([k,r])=>r.current==='green').length+'</b>grün</div><div class="stat"><b>'+hist.filter(([k,r])=>r.current==='present').length+'</b>war da</div><div class="stat"><b>'+hist.reduce((a,[k,r])=>a+(r.notes?.length||0),0)+'</b>Notizen</div></div></div></div>')}
function historyRow(k,r){let cid=k.split('|')[0],e=entries.find(x=>x.id===cid),last=r.history[r.history.length-1],lastNote=r.notes?.slice(-1)[0];return '<div class="historyline"><b>'+(e?e.subject+' · '+e.text:'Eintrag')+'</b><br>Aktuell: '+(r.current||'—')+' · erstmals grün: '+(r.firstGreen||'—')+'<br>'+r.history.length+' Bewertung(en) · '+(r.notes?.length||0)+' Notiz(en)'+(last?'<br>zuletzt: '+last.teacher+' · '+last.context+' · '+last.date:'')+(lastNote?'<div class="noteBox">'+lastNote.teacher+': '+lastNote.note+'</div>':'')+'</div>'}

function admin(){if(!canEdit()){shell(head('Kein Zugriff','Nur Stufenleitung und Admin.'));return}let h=head('Verwaltung','Einträge für Lernen, Werkstatt, Kreativband und Clubs bearbeiten.')+'<button class="chip dark" onclick="showCompForm=!showCompForm;editCompId=null;render()">+ Eintrag anlegen</button>';if(showCompForm)h+=entryForm();h+='<div class="list">'+entries.map(e=>'<div class="row"><div><b>'+e.text+'</b><div class="mini">'+meta(e)+'</div></div><button class="chip" onclick="editCompId=\\''+e.id+'\\';showCompForm=true;render()">Bearbeiten</button></div>').join('')+'</div>';shell(h)}
function entryForm(){let e=editCompId?entries.find(x=>x.id===editCompId):{learning:'Werkstatt',sprint:1,subject:'WBS',area:'Neuer Bereich',level:'alle',type:'kompetenz',text:'Ich kann ...'};return '<div class="card"><h2>'+(editCompId?'Eintrag bearbeiten':'Neuer Eintrag')+'</h2><div class="formgrid"><div><label>Lernbereich</label><select id="ef_learning"><option '+sel(e.learning,'Kernfächer')+'>Kernfächer</option><option '+sel(e.learning,'Werkstatt')+'>Werkstatt</option><option '+sel(e.learning,'Kreativband/Labore')+'>Kreativband/Labore</option><option '+sel(e.learning,'Clubs')+'>Clubs</option></select></div><div><label>Sprint</label><select id="ef_sprint"><option value="">kein Sprint</option>'+[1,2,3,4,5].map(n=>'<option value="'+n+'" '+(e.sprint==n?'selected':'')+'>Sprint '+n+'</option>').join('')+'</select></div><div><label>Fach/Angebot</label><input id="ef_subject" value="'+e.subject+'"></div><div><label>Bereich</label><input id="ef_area" value="'+e.area+'"></div><div><label>Niveau</label><select id="ef_level"><option '+sel(e.level,'alle')+'>alle</option><option '+sel(e.level,'G')+'>G</option><option '+sel(e.level,'M')+'>M</option><option '+sel(e.level,'E')+'>E</option><option '+sel(e.level,'G/M/E')+'>G/M/E</option><option '+sel(e.level,'-')+'>-</option></select></div><div><label>Typ</label><select id="ef_type"><option value="kompetenz" '+(e.type==='kompetenz'?'selected':'')+'>Kompetenz</option><option value="teilnahme" '+(e.type==='teilnahme'?'selected':'')+'>Teilnahme</option><option value="engagement" '+(e.type==='engagement'?'selected':'')+'>Engagement</option></select></div></div><label>Text</label><textarea id="ef_text">'+e.text+'</textarea><button class="chip dark" onclick="saveEntry()">Speichern</button></div>'}
function saveEntry(){let sp=ef_sprint.value?Number(ef_sprint.value):null;if(editCompId){let e=entries.find(x=>x.id===editCompId);e.learning=ef_learning.value;e.sprint=sp;e.subject=ef_subject.value;e.area=ef_area.value;e.level=ef_level.value;e.type=ef_type.value;e.text=ef_text.value}else{entries.push({id:'e'+Date.now(),learning:ef_learning.value,sprint:sp,subject:ef_subject.value,area:ef_area.value,level:ef_level.value,type:ef_type.value,text:ef_text.value})}showCompForm=false;editCompId=null;persist();toast();render()}
function development(){let h=head('Entwicklung','Wer hat wann was bewertet oder notiert?');let recs=Object.entries(records).slice(-60).reverse();h+='<div class="list">'+(recs.length?recs.map(([k,r])=>'<div class="card">'+historyRow(k,r)+'</div>').join(''):'<div class="card"><p>Noch keine Veränderungen gespeichert.</p></div>')+'</div>';shell(h)}
render();
</script></body>
</html>
