<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kompass</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e6e8f0;--soft:#eef2ff;--shadow:0 10px 30px rgba(16,24,40,.08);--green:#d9f7e8;--yellow:#fff3c4;--red:#ffe0df}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}aside{background:white;border-right:1px solid var(--line);padding:24px}.logo{font-size:32px;font-weight:900}.sub{color:var(--muted);font-size:14px;margin:4px 0 24px}.nav button{width:100%;border:0;background:transparent;text-align:left;padding:15px;border-radius:17px;margin:4px 0;font-size:16px}.nav button.active{background:var(--soft);font-weight:800;color:#3142aa}main{padding:28px;max-width:1450px}h1{font-size:34px;margin:0 0 8px}.hint{color:var(--muted);margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card,.tile{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}.tile{text-align:left;cursor:pointer;min-height:112px}.tile b{font-size:21px;display:block;margin-bottom:8px}.tile span,.card p{color:var(--muted)}.section{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:28px 0 10px}.chip{display:inline-block;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 14px;margin:0 8px 12px 0}.chip.dark{background:#172033;color:white}.matrix-wrap{overflow:auto}table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:960px}th{color:var(--muted);font-size:13px;text-align:center;padding:8px}th:first-child{text-align:left}td{background:white;padding:10px;border-top:1px solid #f0f1f6;border-bottom:1px solid #f0f1f6}td:first-child{border-left:1px solid #f0f1f6;border-radius:16px 0 0 16px;font-weight:750;min-width:280px}td:last-child{border-right:1px solid #f0f1f6;border-radius:0 16px 16px 0}.status{width:44px;height:44px;border-radius:14px;border:2px solid #e5e7ef;background:#f2f4f7;margin:0 2px;font-weight:900}.status.sel.green{background:var(--green);border-color:#55d49a;color:#087443}.status.sel.yellow{background:var(--yellow);border-color:#f2c94c;color:#946200}.status.sel.red{background:var(--red);border-color:#f97066;color:#b42318}.students{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.toast{position:fixed;right:20px;bottom:20px;background:#172033;color:white;border-radius:999px;padding:14px 18px;opacity:0;transition:.2s}.toast.show{opacity:1}.mobile{display:none}@media(max-width:900px){.app{display:block}aside{display:none}main{padding:18px 14px 88px}.grid{grid-template-columns:1fr}.students{grid-template-columns:1fr 1fr}h1{font-size:29px}.mobile{display:flex;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);padding:8px;gap:6px}.mobile button{flex:1;border:0;background:transparent;border-radius:14px;padding:10px 4px}.mobile button.active{background:var(--soft);font-weight:900;color:#3142aa}}
</style>
</head>
<body><div id="root"></div><div id="toast" class="toast">Gespeichert</div>
<script>
let view="start",subject=null;const pupils=["Noah","Anna","Lea","Max","Mira","Tim","Lina","David"];
const subjects={"Englisch":{"Grammatik":["Simple Present anwenden","Fragen bilden"],"Schreiben":["Über Alltag schreiben"],"Lesen":["Informationen entnehmen"]},"Deutsch":{"Lesen":["Sachtexten Informationen entnehmen"],"Schreiben":["Text planen"]},"Mathematik":{"Daten":["Diagramme lesen und beschreiben"],"Zahlen":["Mit Größen rechnen"]},"WBS":{"Wirtschaft":["Kostenarten unterscheiden","Diagramme analysieren"],"Berufsorientierung":["Berufe recherchieren"]},"Biologie":{"Naturwissenschaftlich arbeiten":["Versuche beschreiben","Beobachtungen protokollieren"]},"Technik":{"Sicherheit":["Werkzeuge sicher nutzen"],"Konstruktion":["Modell planen"]},"Gitarre":{"Club":["regelmäßig teilgenommen","engagiert mitgearbeitet"]}};
const groups={kern:["Englisch","Deutsch","Mathematik"],werkstatt:["WBS","Biologie","Technik"],clubs:["Gitarre"]};let ratings=JSON.parse(localStorage.getItem("kompass_ratings_v1")||"{}");
function save(){localStorage.setItem("kompass_ratings_v1",JSON.stringify(ratings))}function key(c,p){return c+"|"+p}function rate(c,p,v){ratings[key(c,p)]=v;save();toast();render()}function toast(){let t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),850)}
function shell(content){root.innerHTML='<div class="app"><aside><div class="logo">Kompass</div><div class="sub">Web-Demo 1.0 · iPad first</div><div class="nav">'+btn("start","🏠 Start")+btn("years","👥 Jahrgänge")+btn("matrix","✅ Kompetenzmatrix")+btn("profiles","🧑‍🎓 Schülerprofile")+btn("reports","📊 Auswertungen")+'</div></aside><main>'+content+'</main></div><div class="mobile">'+mbtn("start","Start")+mbtn("years","Jg.")+mbtn("matrix","Matrix")+mbtn("profiles","Profile")+mbtn("reports","Stats")+'</div>'}
function btn(v,l){return '<button class="'+(view==v?'active':'')+'" onclick="go(\''+v+'\')">'+l+'</button>'}function mbtn(v,l){return '<button class="'+(view==v?'active':'')+'" onclick="go(\''+v+'\')">'+l+'</button>'}function go(v){view=v;subject=null;render()}function head(t,h){return '<h1>'+t+'</h1><div class="hint">'+h+'</div>'}function render(){if(view==="start")start();if(view==="years")years();if(view==="matrix")matrix();if(view==="profiles")profiles();if(view==="reports")reports()}
function start(){shell(head("Start","Kompass macht Kompetenzentwicklung sichtbar – iPad-first und schulweit gedacht.")+'<div class="grid"><button class="tile" onclick="go(\'matrix\')"><b>✅ Kompetenzmatrix</b><span>Fach öffnen, Bereich aufklappen, bewerten.</span></button><button class="tile" onclick="go(\'years\')"><b>👥 Jahrgänge 5–10</b><span>Admin-Übersicht über Klassen und SuS.</span></button><button class="tile" onclick="go(\'profiles\')"><b>🧑‍🎓 Lernprofile</b><span>Schülerentwicklung gesammelt ansehen.</span></button></div>')}
function years(){let h=head("Jahrgänge","Admin sieht alle Jahrgänge; Lehrkräfte später nur zugeordnete Jahrgänge.")+'<div class="grid">';for(let y=5;y<=10;y++)h+='<button class="tile"><b>Jahrgang '+y+'</b><span>Klassen und Lerngruppen öffnen</span></button>';shell(h+'</div>')}
function matrix(){if(!subject){let h=head("Kompetenzmatrix","Zuerst Fach auswählen. Erst danach erscheinen Bereiche und Kompetenzen.");h+=section("Kernfächer",groups.kern)+section("Werkstatt",groups.werkstatt)+section("Clubs & Kreativband",groups.clubs);shell(h);return}let h=head(subject,"Bereiche öffnen und Kompetenzen bewerten. Die Auswahl bleibt sichtbar markiert.")+'<button class="chip" onclick="subject=null;render()">← Fächerübersicht</button><span class="chip dark">'+subject+'</span>';Object.keys(subjects[subject]).forEach(area=>{h+='<div class="card"><h2>'+area+'</h2><div class="matrix-wrap"><table><thead><tr><th>Kompetenz</th>'+pupils.map(p=>'<th>'+p+'</th>').join('')+'</tr></thead><tbody>';subjects[subject][area].forEach(c=>h+='<tr><td>'+c+'</td>'+pupils.map(p=>cell(c,p)).join('')+'</tr>');h+='</tbody></table></div></div>'});shell(h)}
function section(title,list){return '<div class="section">'+title+'</div><div class="grid">'+list.map(s=>'<button class="tile" onclick="subject=\''+s+'\';render()"><b>'+s+'</b><span>'+Object.values(subjects[s]).flat().length+' Kompetenzen · öffnen</span></button>').join('')+'</div>'}
function cell(c,p){let v=ratings[key(c,p)]||"";return '<td><button class="status '+(v==="green"?"sel green":"")+'" onclick="rate(\''+c+'\',\''+p+'\',\'green\')">●</button><button class="status '+(v==="yellow"?"sel yellow":"")+'" onclick="rate(\''+c+'\',\''+p+'\',\'yellow\')">●</button><button class="status '+(v==="red"?"sel red":"")+'" onclick="rate(\''+c+'\',\''+p+'\',\'red\')">●</button></td>'}
function profiles(){shell(head("Schülerprofile","Lernprofil statt Datenbankliste.")+'<div class="students">'+pupils.map(p=>'<div class="card"><h2>'+p+'</h2><p>Klasse 5d · Kernfächer, Werkstatt, Clubs</p></div>').join('')+'</div>')}
function reports(){shell(head("Auswertungen","Überblick für Stufenleitung und Lernentwicklungsgespräche.")+'<div class="grid"><div class="card"><h2>Englisch</h2><p>72 % bewertet</p></div><div class="card"><h2>Werkstatt</h2><p>64 % bewertet</p></div><div class="card"><h2>Offene Pflichtkompetenzen</h2><p>5 SuS ohne Bewertung bei Diagramme analysieren.</p></div></div>')}render();
</script></body></html>
