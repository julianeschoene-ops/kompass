<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kompass</title>
<style>
:root{
  --bg:#f6f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e6e8f0;
  --soft:#eef2ff;--shadow:0 10px 30px rgba(16,24,40,.08);
  --blue:#4f8cff;--red:#ef5b5b;--yellow:#f3c64e;--violet:#8b5cf6;--green:#34c779;
  --good:#d9f7e8;--mid:#fff3c4;--bad:#ffe0df;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
aside{background:#fff;border-right:1px solid var(--line);padding:24px;position:sticky;top:0;height:100vh}
.logo{font-size:32px;font-weight:900}.sub{color:var(--muted);font-size:14px;margin:4px 0 24px}
.nav button{width:100%;border:0;background:transparent;text-align:left;padding:15px 16px;border-radius:17px;margin:4px 0;font-size:16px;cursor:pointer}
.nav button.active{background:var(--soft);font-weight:800;color:#3142aa}
main{padding:28px;max-width:1480px;width:100%}
h1{font-size:34px;margin:0 0 8px}.hint{color:var(--muted);margin-bottom:22px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}
.card,.tile{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}
.tile{text-align:left;cursor:pointer;min-height:112px}.tile b{font-size:21px;display:block;margin-bottom:8px}.tile span,.card p{color:var(--muted);line-height:1.45}
.section{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:28px 0 10px}
.class-card{color:white;border:0}.class-card span{color:rgba(255,255,255,.86)}.a{background:var(--blue)}.b{background:var(--red)}.c{background:var(--yellow);color:#4b3b00}.c span{color:#6b5700}.d{background:var(--violet)}.e{background:var(--green)}
.student-list{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.student{display:flex;gap:12px;align-items:center;cursor:pointer}
.dot{width:18px;height:18px;border-radius:50%;flex:0 0 auto}.mini{font-size:13px;color:var(--muted)}
.chip{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;margin:0 8px 12px 0;cursor:pointer}.chip.dark{background:#172033;color:#fff;border-color:#172033}
.matrix-wrap{overflow:auto;-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:960px}
th{color:var(--muted);font-size:13px;text-align:center;padding:8px}th:first-child{text-align:left}
td{background:white;padding:10px;border-top:1px solid #f0f1f6;border-bottom:1px solid #f0f1f6}
td:first-child{border-left:1px solid #f0f1f6;border-radius:16px 0 0 16px;font-weight:750;min-width:290px}td:last-child{border-right:1px solid #f0f1f6;border-radius:0 16px 16px 0}
.status{width:44px;height:44px;border-radius:14px;border:2px solid #e5e7ef;background:#f2f4f7;margin:0 2px;font-weight:900;cursor:pointer}
.status.sel.green{background:var(--good);border-color:#55d49a;color:#087443}.status.sel.yellow{background:var(--mid);border-color:#f2c94c;color:#946200}.status.sel.red{background:var(--bad);border-color:#f97066;color:#b42318}
.profile-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:white;border:1px solid var(--line);border-radius:18px;padding:14px 18px;text-align:center;min-width:94px}.stat b{font-size:25px;display:block}
.toast{position:fixed;right:20px;bottom:20px;background:#172033;color:white;border-radius:999px;padding:14px 18px;opacity:0;transition:.2s;box-shadow:var(--shadow)}.toast.show{opacity:1}
.mobile{display:none}
@media(max-width:900px){
.app{display:block}aside{display:none}main{padding:18px 14px 88px}.grid,.grid5{grid-template-columns:1fr}.student-list{grid-template-columns:1fr 1fr}h1{font-size:29px}
.mobile{display:flex;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);padding:8px;gap:6px}.mobile button{flex:1;border:0;background:transparent;border-radius:14px;padding:10px 4px}.mobile button.active{background:var(--soft);font-weight:900;color:#3142aa}
}
</style>
</head>
<body>
<div id="root"></div><div id="toast" class="toast">Gespeichert</div>
<script>
let view="start", year=5, cls=null, subject=null, pupil=null;
const classColors={a:"blue",b:"red",c:"yellow",d:"violet",e:"green"};
const pupils=[
{id:"david",first:"David",last:"Navaratnam",short:"David N.",class:"5d",color:"d",coach:"Juliane"},
{id:"noah",first:"Noah",last:"Müller",short:"Noah M.",class:"5a",color:"a",coach:"Nicole"},
{id:"anna",first:"Anna",last:"Keller",short:"Anna K.",class:"5b",color:"b",coach:"Dagmar"},
{id:"lea",first:"Lea",last:"Schneider",short:"Lea S.",class:"5c",color:"c",coach:"Peter"},
{id:"mira",first:"Mira",last:"Tuna",short:"Mira T.",class:"5e",color:"e",coach:"Julia"},
{id:"max",first:"Max",last:"Weber",short:"Max W.",class:"5d",color:"d",coach:"Juliane"},
{id:"lina",first:"Lina",last:"Fischer",short:"Lina F.",class:"5d",color:"d",coach:"Juliane"},
{id:"tim",first:"Tim",last:"Becker",short:"Tim B.",class:"5a",color:"a",coach:"Nicole"}
];
const subjects={
"Englisch":{group:"Kernfächer",areas:{"Grammatik":["Simple Present anwenden","Fragen bilden","Kurzformen von to be anwenden"],"Schreiben":["Über Alltag schreiben","Kurze Fragen schriftlich beantworten"],"Lesen":["Informationen entnehmen"]}},
"Deutsch":{group:"Kernfächer",areas:{"Lesen":["Sachtexten Informationen entnehmen"],"Schreiben":["Text planen"]}},
"Mathematik":{group:"Kernfächer",areas:{"Daten":["Diagramme lesen und beschreiben"],"Zahlen":["Mit Größen rechnen"]}},
"WBS":{group:"Werkstatt",areas:{"Wirtschaft":["Kostenarten unterscheiden","Kosten berechnen","Diagramme analysieren"],"Berufsorientierung":["Berufe recherchieren"]}},
"Biologie":{group:"Werkstatt",areas:{"Naturwissenschaftlich arbeiten":["Versuche beschreiben","Beobachtungen protokollieren"]}},
"Physik":{group:"Werkstatt",areas:{"Messen":["Messwerte erfassen"],"Auswerten":["Ergebnisse darstellen"]}},
"Technik":{group:"Werkstatt",areas:{"Sicherheit":["Werkzeuge sicher nutzen"],"Konstruktion":["Modell planen"]}},
"AES":{group:"Werkstatt",areas:{"Praxis":["Arbeitsabläufe planen"],"Nachweis":["Küchenregeln einhalten"]}},
"Informatik & Medienpädagogik":{group:"Werkstatt",areas:{"Medien":["Dateien sinnvoll organisieren"],"Programmieren":["einfache Befehle erklären"]}},
"Geschichte":{group:"Werkstatt",areas:{"Quellen":["Quellen untersuchen"]}},
"Geografie":{group:"Werkstatt",areas:{"Karten":["Karten Informationen entnehmen"]}},
"Gemeinschaftskunde":{group:"Werkstatt",areas:{"Demokratie":["Mitbestimmung erklären"]}},
"Gitarre":{group:"Clubs",areas:{"Teilnahme & Engagement":["regelmäßig teilgenommen","engagiert mitgearbeitet"]}},
"Garten":{group:"Kreativband/Labore",areas:{"Praxis":["Werkzeuge verantwortungsvoll nutzen"]}},
"Robotik":{group:"Kreativband/Labore",areas:{"Labor":["Sensoren testen","Roboter steuern"]}}
};
let ratings=JSON.parse(localStorage.getItem("kompass_v2_ratings")||"{}");
function save(){localStorage.setItem("kompass_v2_ratings",JSON.stringify(ratings))}
function key(c,p){return c+"|"+p}
function rate(c,p,v){ratings[key(c,p)]=v;save();toast();render()}
function toast(){let t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),850)}
function shell(content){root.innerHTML='<div class="app"><aside><div class="logo">Kompass</div><div class="sub">Schulstruktur · v1.1</div><div class="nav">'+btn("start","🏠 Start")+btn("years","👥 Jahrgänge")+btn("students","🗂️ Schülerdatenbank")+btn("matrix","✅ Kompetenzmatrix")+btn("catalog","📚 Kompetenzkatalog")+btn("reports","📊 Auswertungen")+'</div></aside><main>'+content+'</main></div><div class="mobile">'+mbtn("start","Start")+mbtn("years","Jg.")+mbtn("students","SuS")+mbtn("matrix","Matrix")+mbtn("reports","Stats")+'</div>'}
function btn(v,l){return '<button class="'+(view==v?'active':'')+'" onclick="go(\\''+v+'\\')">'+l+'</button>'}
function mbtn(v,l){return '<button class="'+(view==v?'active':'')+'" onclick="go(\\''+v+'\\')">'+l+'</button>'}
function go(v){view=v;cls=null;subject=null;pupil=null;render()}
function head(t,h){return '<h1>'+t+'</h1><div class="hint">'+h+'</div>'}
function render(){if(view==="start")start();if(view==="years")years();if(view==="students")students();if(view==="matrix")matrix();if(view==="catalog")catalog();if(view==="reports")reports()}
function start(){shell(head("Hallo Juliane","Kompass bündelt Jahrgänge, Schülerdatenbank und Kompetenzentwicklung.")+'<div class="grid"><button class="tile" onclick="go(\\'matrix\\')"><b>✅ Kompetenzmatrix</b><span>Fach öffnen, Bereich aufklappen, bewerten.</span></button><button class="tile" onclick="go(\\'students\\')"><b>🗂️ Schülerdatenbank</b><span>David N. und weitere Lernprofile.</span></button><button class="tile" onclick="go(\\'years\\')"><b>👥 Jahrgänge 5–10</b><span>Admin- und Stufenleitungsübersicht.</span></button></div><div class="section">Klassenfarben Jahrgang 5</div>'+classGrid(5))}
function classGrid(y){let h='<div class="grid5">';["a","b","c","d","e"].forEach(c=>h+='<button class="tile class-card '+c+'" onclick="cls=\\''+y+c+'\\';view=\\'students\\';render()"><b>'+y+c+'</b><span>'+className(c)+' · 24 SuS</span></button>');return h+'</div>'}
function className(c){return {a:"Blau",b:"Rot",c:"Gelb",d:"Violett",e:"Grün"}[c]}
function years(){let h=head("Jahrgänge","Admin sieht alle Jahrgänge 5–10. Stufenleitungen sehen ihre Jahrgänge.")+'<div class="grid">';for(let y=5;y<=10;y++)h+='<button class="tile" onclick="year='+y+';renderYear()"><b>Jahrgang '+y+'</b><span>Klassen, Lernbereiche und SuS öffnen</span></button>';shell(h+'</div>')}
function renderYear(){shell(head("Jahrgang "+year,"Klassenübersicht mit euren festen Farben.")+classGrid(year))}
function studentList(){let list=pupils.filter(p=>!cls||p.class===cls);return '<div class="student-list">'+list.map(p=>'<div class="student card" onclick="pupil=\\''+p.id+'\\';renderStudent()"><span class="dot '+p.color+'"></span><div><b>'+p.short+'</b><div class="mini">'+p.class+' · Lerncoach: '+p.coach+'</div></div></div>').join('')+'</div>'}
function students(){shell(head(cls?("Klasse "+cls):"Schülerdatenbank","Kurznamen und Klassenfarben statt voller Verwaltungslisten.")+(cls?'<button class="chip" onclick="cls=null;render()">← alle anzeigen</button>':'')+studentList())}
function renderStudent(){let p=pupils.find(x=>x.id===pupil);shell(head(p.short,"Lernprofil · "+p.class+" · Lerncoach: "+p.coach)+'<button class="chip" onclick="pupil=null;render()">← Schülerdatenbank</button><div class="card"><div class="profile-head"><div><h2>'+p.first+' '+p.last+'</h2><p>Anzeige in Übersichten: '+p.short+' · Klasse '+p.class+'</p></div><div class="stats"><div class="stat"><b>18</b>grün</div><div class="stat"><b>7</b>gelb</div><div class="stat"><b>2</b>rot</div></div></div></div><div class="section">Lernbereiche</div><div class="grid"><div class="card"><h2>Kernfächer</h2><p>Deutsch, Mathematik, Englisch</p></div><div class="card"><h2>Werkstatt</h2><p>WBS, Bio, Technik, AES, Geschichte...</p></div><div class="card"><h2>Clubs & Labore</h2><p>Teilnahme, Engagement, Nachweise</p></div></div>')}
function matrix(){if(!subject){let h=head("Kompetenzmatrix","Zuerst Lernbereich und Fach auswählen. Erst dann erscheinen Bereiche und Kompetenzen.");["Kernfächer","Werkstatt","Kreativband/Labore","Clubs"].forEach(g=>{h+='<div class="section">'+g+'</div><div class="grid">'+Object.keys(subjects).filter(s=>subjects[s].group===g).map(s=>'<button class="tile" onclick="subject=\\''+s+'\\';render()"><b>'+s+'</b><span>'+Object.values(subjects[s].areas).flat().length+' Kompetenzen · öffnen</span></button>').join('')+'</div>'});shell(h);return}
let h=head(subject,"Bereich öffnen und Kompetenzen bewerten. Die Auswahl bleibt sichtbar markiert.")+'<button class="chip" onclick="subject=null;render()">← Fächerübersicht</button><span class="chip dark">'+subjects[subject].group+'</span>';Object.keys(subjects[subject].areas).forEach(area=>{h+='<div class="card"><h2>'+area+'</h2><div class="matrix-wrap"><table><thead><tr><th>Kompetenz</th>'+pupils.map(p=>'<th><span class="dot '+p.color+'"></span><br>'+p.short+'</th>').join('')+'</tr></thead><tbody>';subjects[subject].areas[area].forEach(c=>h+='<tr><td>'+c+'</td>'+pupils.map(p=>cell(c,p.id)).join('')+'</tr>');h+='</tbody></table></div></div>'});shell(h)}
function cell(c,p){let v=ratings[key(c,p)]||"";return '<td><button class="status '+(v==="green"?"sel green":"")+'" onclick="rate(\\''+c+'\\',\\''+p+'\\',\\'green\\')">●</button><button class="status '+(v==="yellow"?"sel yellow":"")+'" onclick="rate(\\''+c+'\\',\\''+p+'\\',\\'yellow\\')">●</button><button class="status '+(v==="red"?"sel red":"")+'" onclick="rate(\\''+c+'\\',\\''+p+'\\',\\'red\\')">●</button></td>'}
function catalog(){let h=head("Kompetenzkatalog","Stufenleitungen und Admins können Kompetenzen später anlegen und bearbeiten.");Object.keys(subjects).forEach(s=>{h+='<div class="card"><h2>'+s+'</h2><p>'+subjects[s].group+'</p></div>'});shell(h)}
function reports(){shell(head("Auswertungen","Überblick für Stufenleitung, Fachschaften und LEG.")+'<div class="grid"><div class="card"><h2>Englisch</h2><p>72 % bewertet</p></div><div class="card"><h2>Werkstatt</h2><p>64 % bewertet</p></div><div class="card"><h2>Offene Pflichtkompetenzen</h2><p>5 SuS ohne Bewertung bei Diagramme analysieren.</p></div></div>')}
render();
</script>
</body>
</html>
