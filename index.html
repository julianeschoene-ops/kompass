<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kompass 2.5</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#13213b;--muted:#667085;--line:#dfe7f2;--nav:#082a53;--active:#def3e8;--shadow:0 14px 34px rgba(18,36,72,.10);--blue:#4f8cff;--red:#ef5b5b;--yellow:#f3c64e;--violet:#8b5cf6;--green:#34c779;--ok:#d9f7e8;--mid:#fff3c4;--bad:#ffe0df;--note:#fff8dd}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{display:grid;grid-template-columns:285px 1fr;min-height:100vh}aside{background:var(--nav);color:#fff;padding:24px;position:sticky;top:0;height:100vh}.logo{font-size:31px;font-weight:900}.sub{color:#c8d8ed;margin:8px 0 20px}.role{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:12px;margin-bottom:18px}.role select{width:100%;border:0;background:transparent;color:#fff;font-weight:800}.role option{color:#111}.nav button{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:14px 16px;border-radius:16px;margin:4px 0;font-size:16px;cursor:pointer}.nav button.active{background:var(--active);color:#082a53;font-weight:850}main{padding:28px;max-width:1540px;width:100%}h1{font-size:34px;margin:0 0 8px}.hint{color:var(--muted);margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}.card,.tile{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow)}.tile{text-align:left;cursor:pointer;min-height:112px}.tile b{font-size:21px;display:block;margin-bottom:8px}.tile span,.card p{color:var(--muted);line-height:1.45}.section{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:26px 0 10px}.chip{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;margin:0 8px 12px 0;cursor:pointer}.chip.active,.chip.dark{background:#14213d;color:#fff;border-color:#14213d}.chip.note{background:var(--note)}.a{background:var(--blue)}.b{background:var(--red)}.c{background:var(--yellow);color:#4b3b00}.d{background:var(--violet)}.e{background:var(--green)}.klasse{color:#fff;border:0}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px}.mini{font-size:13px;color:var(--muted)}.students{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.list{display:grid;gap:10px}.row{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;display:flex;justify-content:space-between;gap:12px;align-items:center}.status{width:44px;height:44px;border-radius:15px;border:2px solid #d7e0ee;background:#f7f9fc;margin:0 2px;font-weight:900;cursor:pointer}.status.green.on{background:var(--ok);border-color:#55d49a;color:#087443}.status.yellow.on{background:var(--mid);border-color:#f2c94c;color:#946200}.status.red.on{background:var(--bad);border-color:#f97066;color:#b42318}.status.present.on{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.status.effort.on{background:#ede9fe;border-color:#a78bfa;color:#6d28d9}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px;margin:6px 0 12px;font:inherit;background:#fff}textarea{min-height:76px}label{font-weight:800}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.profile{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 18px;text-align:center;min-width:94px}.stat b{font-size:25px;display:block}.path{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}.path span{background:#eef4fb;border:1px solid var(--line);border-radius:999px;padding:8px 12px;color:#53627a}.noteBox{background:var(--note);border:1px solid #ffe8a3;border-radius:14px;padding:10px;margin-top:10px;color:#765400}.historyline{border-left:3px solid #dfe7f2;padding:8px 0 8px 14px;color:var(--muted)}.toast{position:fixed;right:22px;bottom:22px;background:#14213d;color:#fff;border-radius:999px;padding:14px 18px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:900px){.app{display:block}aside{display:none}main{padding:18px 14px}.grid,.grid2,.grid5,.formgrid,.profile{grid-template-columns:1fr}.students{grid-template-columns:1fr 1fr}h1{font-size:29px}}</style></head>
<body><div id="root"></div><div id="toast" class="toast">Gespeichert</div><script>
let view='dashboard',role='Stufenleitung',teacher='Juliane',selectedLearning=null,selectedSubject=null,selectedArea=null,selectedComp=null,sprint=1,klasse=null,year=null,pupilId=null,showStudentForm=false,showCompForm=false,editPupilId=null,editCompId=null,noteTarget=null;
const seedPupils=[{id:'david',short:'David N.',full:'David Navaratnam',className:'5d',color:'d',coach:'Juliane'},{id:'noah',short:'Noah M.',full:'Noah Müller',className:'5a',color:'a',coach:'Nicole'},{id:'anna',short:'Anna K.',full:'Anna Keller',className:'5b',color:'b',coach:'Dagmar'},{id:'lea',short:'Lea S.',full:'Lea Schneider',className:'5c',color:'c',coach:'Peter'},{id:'mira',short:'Mira T.',full:'Mira Tuna',className:'5e',color:'e',coach:'Julia'},{id:'max',short:'Max W.',full:'Max Weber',className:'6d',color:'d',coach:'Juliane'},{id:'lina',short:'Lina F.',full:'Lina Fischer',className:'7d',color:'d',coach:'Juliane'},{id:'tim',short:'Tim B.',full:'Tim Becker',className:'5a',color:'a',coach:'Nicole'}];
const seedComps=[{id:'eng_g1',learning:'Kernfächer',sprint:null,subject:'Englisch',area:'Grammatik',level:'G/M/E',type:'kompetenz',text:'Simple Present anwenden'},{id:'eng_s1',learning:'Kernfächer',sprint:null,subject:'Englisch',area:'Schreiben',level:'G/M/E',type:'kompetenz',text:'Über Alltag schreiben'},{id:'de_l1',learning:'Kernfächer',sprint:null,subject:'Deutsch',area:'Lesen',level:'G/M/E',type:'kompetenz',text:'Sachtexten Informationen entnehmen'},{id:'ma_d1',learning:'Kernfächer',sprint:null,subject:'Mathematik',area:'Daten',level:'G/M/E',type:'kompetenz',text:'Diagramme lesen'},{id:'wbs1_chart',learning:'Werkstatt',sprint:1,subject:'WBS',area:'Wirtschaft',level:'G/M/E',type:'kompetenz',text:'Diagramme analysieren'},{id:'wbs1_cost',learning:'Werkstatt',sprint:1,subject:'WBS',area:'Wirtschaft',level:'alle',type:'kompetenz',text:'Kostenarten unterscheiden'},{id:'geo1_map',learning:'Werkstatt',sprint:1,subject:'Geografie',area:'Räume analysieren',level:'alle',type:'kompetenz',text:'Karten Informationen entnehmen'},{id:'bio2_exp',learning:'Werkstatt',sprint:2,subject:'Biologie',area:'Naturwissenschaftlich arbeiten',level:'alle',type:'kompetenz',text:'Versuche beschreiben'},{id:'tech3_safe',learning:'Werkstatt',sprint:3,subject:'Technik',area:'Sicherheit',level:'alle',type:'kompetenz',text:'Werkzeuge sicher nutzen'},{id:'aes4_food',learning:'Werkstatt',sprint:4,subject:'AES',area:'Praxis',level:'alle',type:'kompetenz',text:'Arbeitsabläufe planen'},{id:'kb_garden_att',learning:'Kreativband/Labore',sprint:null,subject:'Garten',area:'Teilnahme',level:'-',type:'teilnahme',text:'war anwesend'},{id:'kb_garden_eff',learning:'Kreativband/Labore',sprint:null,subject:'Garten',area:'Engagement',level:'-',type:'engagement',text:'hat engagiert mitgearbeitet'},{id:'kb_robot_comp',learning:'Kreativband/Labore',sprint:null,subject:'Robotik',area:'optionale Kompetenz',level:'alle',type:'kompetenz',text:'Sensoren testen'},{id:'club_guitar_att',learning:'Clubs',sprint:null,subject:'Gitarre',area:'Teilnahme',level:'-',type:'teilnahme',text:'war da'},{id:'club_guitar_eff',learning:'Clubs',sprint:null,subject:'Gitarre',area:'Engagement',level:'-',type:'engagement',text:'hat regelmäßig geübt / sich eingebracht'}];
let pupils=JSON.parse(localStorage.getItem('kompass25_pupils')||'null')||seedPupils,comps=JSON.parse(localStorage.getItem('kompass25_comps')||'null')||seedComps,records=JSON.parse(localStorage.getItem('kompass25_records')||'{}');
function persist(){localStorage.setItem('kompass25_pupils',JSON.stringify(pupils));localStorage.setItem('kompass25_comps',JSON.stringify(comps));localStorage.setItem('kompass25_records',JSON.stringify(records))}
function today(){return new Date().toLocaleDateString('de-DE')}function canEdit(){return role==='Stufenleitung'||role==='Admin'}function recKey(c,p){return c+'|'+p}
function setRecord(c,p,value,context='Bewertung'){let k=recKey(c,p),r=records[k]||{current:null,firstGreen:null,history:[],notes:[]};r.current=value;if(value==='green'&&!r.firstGreen)r.firstGreen=today();r.history.push({date:today(),value,teacher,context});records[k]=r;persist();toast();render()}
function addNote(c,p,note,context='Notiz'){let k=recKey(c,p),r=records[k]||{current:null,firstGreen:null,history:[],notes:[]};r.notes.push({date:today(),teacher,context,note});records[k]=r;persist();toast();noteTarget=null;render()}
function toast(){let t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),850)}
function shell(content){root.innerHTML='<div class="app"><aside><div class="logo">KOMPASS</div><div class="sub">Kompass 2.5 · echte Struktur</div><div class="role"><div class="mini">Rolle</div><select onchange="role=this.value;render()"><option '+sel(role,'Lehrkraft')+'>Lehrkraft</option><option '+sel(role,'Stufenleitung')+'>Stufenleitung</option><option '+sel(role,'Admin')+'>Admin</option></select><div class="mini">Lehrkraft</div><select onchange="teacher=this.value;render()"><option '+sel(teacher,'Juliane')+'>Juliane</option><option '+sel(teacher,'Kollege Geo')+'>Kollege Geo</option><option '+sel(teacher,'Nicole')+'>Nicole</option></select></div><div class="nav">'+nav('dashboard','🏠 Dashboard')+nav('lernen','📚 Lernen')+nav('werkstatt','🧪 Werkstatt')+nav('kreativ','🎨 Kreativband')+nav('clubs','🎵 Clubs')+nav('students','🗂️ Schülerdatenbank')+nav('catalog','🛠️ Verwaltung')+nav('development','📈 Entwicklung')+'</div></aside><main>'+content+'</main></div>'}
function sel(a,b){return a===b?'selected':''}function nav(v,t){if(v==='catalog'&&!canEdit())return '';return '<button class="'+(view===v?'active':'')+'" onclick="go(\''+v+'\')">'+t+'</button>'}
function go(v){view=v;selectedLearning=null;selectedSubject=null;selectedArea=null;selectedComp=null;klasse=null;year=null;pupilId=null;noteTarget=null;showStudentForm=false;showCompForm=false;editPupilId=null;editCompId=null;render()}
function head(t,h){return '<h1>'+t+'</h1><div class="hint">'+h+'</div>'}function render(){({dashboard,lernen,werkstatt,kreativ,clubs,students,catalog,development}[view]||dashboard)()}
function dashboard(){shell(head('Guten Morgen, Juliane 👋','Die Startpunkte sind jetzt getrennt: Lernen, Werkstatt, Kreativband und Clubs.')+'<div class="grid"><button class="tile" onclick="go(\'lernen\')"><b>📚 Lernen</b><span>Kernfächer: Fach → Bereich → Kompetenz → SuS.</span></button><button class="tile" onclick="go(\'werkstatt\')"><b>🧪 Werkstatt</b><span>5 Sprints · Fach · Niveau · Notizen.</span></button><button class="tile" onclick="go(\'kreativ\')"><b>🎨 Kreativband/Labore</b><span>Teilnahme, Engagement, optional Kompetenzen.</span></button></div><div class="grid" style="margin-top:16px"><button class="tile" onclick="go(\'clubs\')"><b>🎵 Clubs</b><span>War da, eingebracht, Hinweis.</span></button><button class="tile" onclick="go(\'students\')"><b>🗂️ Schülerdatenbank</b><span>SuS bearbeiten, Profil öffnen.</span></button><button class="tile" onclick="go(\'catalog\')"><b>🛠️ Verwaltung</b><span>Kompetenzen und Einträge bearbeiten.</span></button></div><div class="section">Jahrgänge 5–7</div><div class="grid">'+[5,6,7].map(y=>'<button class="tile" onclick="year='+y+';view=\'students\';render()"><b>Jahrgang '+y+'</b><span>Schüler*innen anzeigen</span></button>').join('')+'</div>')}
function lernen(){selectedLearning='Kernfächer';flow('Lernen','Kernfächer: Fach → Bereich → Kompetenz → Schüler*innen bewerten.')}function werkstatt(){selectedLearning='Werkstatt';let top=head('Werkstattunterricht','Erfassung nach Sprint 1–5. Jeder Sprint kann andere Fächer und Kompetenzen haben.')+'<div>'+[1,2,3,4,5].map(n=>'<button class="chip '+(sprint===n?'active':'')+'" onclick="sprint='+n+';selectedSubject=null;selectedArea=null;selectedComp=null;render()">Sprint '+n+'</button>').join('')+'</div>';flowBody(top)}
function kreativ(){selectedLearning='Kreativband/Labore';flow('Kreativband/Labore','Anwesenheit und Engagement, manchmal optionale Kompetenzen. Notizen immer möglich.')}function clubs(){selectedLearning='Clubs';flow('Clubs','War da, eingebracht, Notiz. Keine klassische Fachmatrix.')}
function flow(title,hint){flowBody(head(title,hint))}function currentComps(){return comps.filter(c=>c.learning===selectedLearning&&(selectedLearning!=='Werkstatt'||c.sprint===sprint))}
function flowBody(prefix){let arr=currentComps(),h=prefix+path();if(!selectedSubject){let subs=[...new Set(arr.map(c=>c.subject))];h+='<div class="section">1. Fach / Angebot wählen</div><div class="grid">'+subs.map(s=>'<button class="tile" onclick="selectedSubject=\''+s+'\';render()"><b>'+s+'</b><span>'+arr.filter(c=>c.subject===s).length+' Einträge</span></button>').join('')+'</div>';shell(h);return}let subArr=arr.filter(c=>c.subject===selectedSubject);if(!selectedArea){let areas=[...new Set(subArr.map(c=>c.area))];h+='<div class="section">2. Bereich wählen</div><div class="grid">'+areas.map(a=>'<button class="tile" onclick="selectedArea=\''+a+'\';render()"><b>'+a+'</b><span>'+subArr.filter(c=>c.area===a).length+' Einträge</span></button>').join('')+'</div>';shell(h);return}let areaArr=subArr.filter(c=>c.area===selectedArea);if(!selectedComp){h+='<div class="section">3. Kompetenz / Eintrag wählen</div><div class="list">'+areaArr.map(c=>'<div class="row"><div><b>'+c.text+'</b><div class="mini">'+meta(c)+'</div></div><button class="chip dark" onclick="selectedComp=\''+c.id+'\';render()">Erfassen</button></div>').join('')+'</div>';shell(h);return}let c=areaArr.find(x=>x.id===selectedComp);h+=assessGroup(c);shell(h)}
function path(){let p=[];if(selectedLearning)p.push(selectedLearning);if(selectedLearning==='Werkstatt')p.push('Sprint '+sprint);if(selectedSubject)p.push(selectedSubject);if(selectedArea)p.push(selectedArea);return '<div class="path">'+p.map(x=>'<span>'+x+'</span>').join('')+'</div><button class="chip" onclick="selectedSubject=null;selectedArea=null;selectedComp=null;render()">zurück zur Übersicht</button>'}
function meta(c){return c.learning+' · '+(c.sprint?'Sprint '+c.sprint+' · ':'')+c.subject+' · '+c.area+' · Niveau: '+c.level+' · '+c.type}
function assessGroup(c){return '<div class="section">4. Schüler*innen erfassen</div><div class="card"><h2>'+c.text+'</h2><p>'+meta(c)+' · Lehrkraft: <b>'+teacher+'</b></p></div><div class="students">'+pupils.map(p=>entryCell(c,p)).join('')+'</div>'}
function entryCell(c,p){let r=records[recKey(c.id,p.id)]||{};let buttons=c.type==='kompetenz'?'<button class="status green '+(r.current==='green'?'on':'')+'" onclick="setRecord(\''+c.id+'\',\''+p.id+'\',\'green\',\''+c.learning+' '+c.subject+'\')">●</button><button class="status yellow '+(r.current==='yellow'?'on':'')+'" onclick="setRecord(\''+c.id+'\',\''+p.id+'\',\'yellow\',\''+c.learning+' '+c.subject+'\')">●</button><button class="status red '+(r.current==='red'?'on':'')+'" onclick="setRecord(\''+c.id+'\',\''+p.id+'\',\'red\',\''+c.learning+' '+c.subject+'\')">●</button>':'<button class="status present '+(r.current==='present'?'on':'')+'" onclick="setRecord(\''+c.id+'\',\''+p.id+'\',\'present\',\''+c.learning+' '+c.subject+'\')">✓</button><button class="status effort '+(r.current==='effort'?'on':'')+'" onclick="setRecord(\''+c.id+'\',\''+p.id+'\',\'effort\',\''+c.learning+' '+c.subject+'\')">★</button>';let note=(noteTarget===c.id+'|'+p.id)?'<textarea id="noteText" placeholder="Notiz hinzufügen..."></textarea><button class="chip dark" onclick="addNote(\''+c.id+'\',\''+p.id+'\',document.getElementById(\'noteText\').value,\''+c.learning+' '+c.subject+'\')">Notiz speichern</button>':'<button class="chip note" onclick="noteTarget=\''+c.id+'|'+p.id+'\';render()">Notiz</button>';return '<div class="card"><span class="dot '+p.color+'"></span><b>'+p.short+'</b><p>'+p.className+'</p>'+buttons+'<div class="mini">'+(r.history?.length||0)+' Bewertungen · '+(r.notes?.length||0)+' Notizen</div>'+note+'</div>'}
function filtered(){let list=pupils.filter(p=>['5','6','7'].includes(p.className[0]));if(year)list=list.filter(p=>p.className[0]==year);if(klasse)list=list.filter(p=>p.className===klasse);return list}
function students(){if(pupilId){studentProfile();return}let h=head(year?'Jahrgang '+year:'Schülerdatenbank','SuS anlegen und bearbeiten.');if(canEdit())h+='<button class="chip dark" onclick="showStudentForm=!showStudentForm;editPupilId=null;render()">+ Schüler*in anlegen</button>';if(showStudentForm)h+=studentForm();h+='<div class="students">'+filtered().map(p=>'<div class="card"><span class="dot '+p.color+'"></span><b>'+p.short+'</b><p>'+p.className+' · '+p.coach+'</p><button class="chip" onclick="pupilId=\''+p.id+'\';render()">Profil</button>'+(canEdit()?'<button class="chip" onclick="editPupilId=\''+p.id+'\';showStudentForm=true;render()">Bearbeiten</button>':'')+'</div>').join('')+'</div>';shell(h)}
function studentForm(){let p=editPupilId?pupils.find(x=>x.id===editPupilId):{full:'Neue Schülerin',short:'Neue S.',className:'5d',coach:'Juliane'};return '<div class="card"><h2>'+(editPupilId?'Schüler*in bearbeiten':'Schüler*in anlegen')+'</h2><div class="formgrid"><div><label>Voller Name</label><input id="sf_full" value="'+p.full+'"></div><div><label>Kurzname</label><input id="sf_short" value="'+p.short+'"></div><div><label>Klasse</label><select id="sf_class">'+[5,6,7].flatMap(y=>['a','b','c','d','e'].map(k=>''+y+k)).map(k=>'<option '+sel(p.className,k)+'>'+k+'</option>').join('')+'</select></div><div><label>Lerncoach</label><input id="sf_coach" value="'+p.coach+'"></div></div><button class="chip dark" onclick="saveStudent()">Speichern</button></div>'}
function saveStudent(){let cls=sf_class.value;if(editPupilId){let p=pupils.find(x=>x.id===editPupilId);p.full=sf_full.value;p.short=sf_short.value;p.className=cls;p.color=cls.slice(-1);p.coach=sf_coach.value}else{pupils.push({id:'s'+Date.now(),full:sf_full.value,short:sf_short.value,className:cls,color:cls.slice(-1),coach:sf_coach.value})}showStudentForm=false;editPupilId=null;persist();toast();render()}
function studentProfile(){let p=pupils.find(x=>x.id===pupilId);let hist=Object.entries(records).filter(([k,r])=>k.endsWith('|'+p.id));shell(head(p.short,'Lernprofil · '+p.className+' · '+p.coach)+'<button class="chip" onclick="pupilId=null;render()">← zurück</button><div class="profile"><div class="card"><h2>'+p.full+'</h2><p>Alle Einträge laufen hier zusammen.</p><div class="list">'+(hist.length?hist.map(([k,r])=>historyRow(k,r)).join(''):'<p>Noch keine Einträge.</p>')+'</div></div><div class="card"><h2>Status</h2><div class="stats"><div class="stat"><b>'+hist.filter(([k,r])=>r.current==='green').length+'</b>grün</div><div class="stat"><b>'+hist.filter(([k,r])=>r.current==='present').length+'</b>war da</div><div class="stat"><b>'+hist.reduce((a,[k,r])=>a+(r.notes?.length||0),0)+'</b>Notizen</div></div></div></div>')}
function historyRow(k,r){let cid=k.split('|')[0],c=comps.find(x=>x.id===cid),last=r.history[r.history.length-1],lastNote=r.notes?.slice(-1)[0];return '<div class="historyline"><b>'+(c?c.subject+' · '+c.text:'Eintrag')+'</b><br>Aktuell: '+(r.current||'—')+' · erstmals grün: '+(r.firstGreen||'—')+'<br>'+r.history.length+' Bewertung(en) · '+(r.notes?.length||0)+' Notiz(en)'+(last?'<br>zuletzt: '+last.teacher+' · '+last.context+' · '+last.date:'')+(lastNote?'<div class="noteBox">'+lastNote.teacher+': '+lastNote.note+'</div>':'')+'</div>'}
function catalog(){if(!canEdit()){shell(head('Kein Zugriff','Nur Stufenleitung und Admin.'));return}let h=head('Verwaltung','Einträge bearbeiten: Lernbereich, Sprint, Fach/Angebot, Bereich, Niveau, Typ, Text.')+'<button class="chip dark" onclick="showCompForm=!showCompForm;editCompId=null;render()">+ Eintrag anlegen</button>';if(showCompForm)h+=compForm();h+='<div class="list">'+comps.map(c=>'<div class="row"><div><b>'+c.text+'</b><div class="mini">'+meta(c)+'</div></div><button class="chip" onclick="editCompId=\''+c.id+'\';showCompForm=true;render()">Bearbeiten</button></div>').join('')+'</div>';shell(h)}
function compForm(){let c=editCompId?comps.find(x=>x.id===editCompId):{learning:'Werkstatt',sprint:1,subject:'WBS',area:'Neuer Bereich',level:'alle',type:'kompetenz',text:'Ich kann ...'};return '<div class="card"><h2>'+(editCompId?'Eintrag bearbeiten':'Neuer Eintrag')+'</h2><div class="formgrid"><div><label>Lernbereich</label><select id="cf_learning"><option '+sel(c.learning,'Kernfächer')+'>Kernfächer</option><option '+sel(c.learning,'Werkstatt')+'>Werkstatt</option><option '+sel(c.learning,'Kreativband/Labore')+'>Kreativband/Labore</option><option '+sel(c.learning,'Clubs')+'>Clubs</option></select></div><div><label>Sprint</label><select id="cf_sprint"><option value="">kein Sprint</option>'+[1,2,3,4,5].map(n=>'<option value="'+n+'" '+(c.sprint==n?'selected':'')+'>Sprint '+n+'</option>').join('')+'</select></div><div><label>Fach/Angebot</label><input id="cf_subject" value="'+c.subject+'"></div><div><label>Bereich</label><input id="cf_area" value="'+c.area+'"></div><div><label>Niveau</label><select id="cf_level"><option '+sel(c.level,'alle')+'>alle</option><option '+sel(c.level,'G')+'>G</option><option '+sel(c.level,'M')+'>M</option><option '+sel(c.level,'E')+'>E</option><option '+sel(c.level,'G/M/E')+'>G/M/E</option><option '+sel(c.level,'-')+'>-</option></select></div><div><label>Typ</label><select id="cf_type"><option value="kompetenz" '+(c.type==='kompetenz'?'selected':'')+'>Kompetenzbewertung</option><option value="teilnahme" '+(c.type==='teilnahme'?'selected':'')+'>Teilnahme / war da</option><option value="engagement" '+(c.type==='engagement'?'selected':'')+'>Engagement</option></select></div></div><label>Text</label><textarea id="cf_text">'+c.text+'</textarea><button class="chip dark" onclick="saveComp()">Speichern</button></div>'}
function saveComp(){let sp=cf_sprint.value?Number(cf_sprint.value):null;if(editCompId){let c=comps.find(x=>x.id===editCompId);c.learning=cf_learning.value;c.sprint=sp;c.subject=cf_subject.value;c.area=cf_area.value;c.level=cf_level.value;c.type=cf_type.value;c.text=cf_text.value}else{comps.push({id:'c'+Date.now(),learning:cf_learning.value,sprint:sp,subject:cf_subject.value,area:cf_area.value,level:cf_level.value,type:cf_type.value,text:cf_text.value})}showCompForm=false;editCompId=null;persist();toast();render()}
function development(){let h=head('Entwicklung','Wer hat wann was bewertet oder notiert?');let entries=Object.entries(records).slice(-50).reverse();h+='<div class="list">'+(entries.length?entries.map(([k,r])=>'<div class="card">'+historyRow(k,r)+'</div>').join(''):'<div class="card"><p>Noch keine Veränderungen gespeichert.</p></div>')+'</div>';shell(h)}
render()
</script></body></html>
