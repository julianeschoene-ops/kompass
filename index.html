<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kompass</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e6e8f0;--soft:#eef2ff;--shadow:0 10px 30px rgba(16,24,40,.08);--blue:#4f8cff;--red:#ef5b5b;--yellow:#f3c64e;--violet:#8b5cf6;--green:#34c779;--good:#d9f7e8;--mid:#fff3c4;--bad:#ffe0df}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}aside{background:white;padding:24px;border-right:1px solid var(--line);position:sticky;top:0;height:100vh}.logo{font-size:32px;font-weight:900}.sub{color:var(--muted);margin:4px 0 18px}.role{border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:18px;background:#fafbff}.role select{width:100%;border:0;background:transparent;font-weight:800;color:#172033}.nav button{display:block;width:100%;padding:14px;border:0;background:transparent;text-align:left;border-radius:14px;margin:4px 0}.nav button.active{background:var(--soft);font-weight:800;color:#3142aa}main{padding:28px;max-width:1500px}h1{font-size:34px;margin:0 0 8px}.hint{color:var(--muted);margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.card{background:white;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}.tile{text-align:left;cursor:pointer;min-height:110px}.tile b{font-size:21px;display:block;margin-bottom:8px}.tile span,.card p{color:var(--muted);line-height:1.45}.section{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:28px 0 10px}.klasse{color:white;border:0}.a{background:var(--blue)}.b{background:var(--red)}.c{background:var(--yellow);color:#4b3b00}.d{background:var(--violet)}.e{background:var(--green)}.students{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px}.mini{font-size:13px;color:var(--muted)}.chip{display:inline-block;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 14px;margin:0 8px 12px 0;cursor:pointer}.chip.dark{background:#172033;color:white}.matrixwrap{overflow:auto}table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:980px}th{color:#667085;font-size:13px;padding:8px;text-align:center}th:first-child{text-align:left}td{background:white;padding:10px;border-top:1px solid #f0f1f6;border-bottom:1px solid #f0f1f6}td:first-child{font-weight:750;border-radius:14px 0 0 14px;min-width:290px}td:last-child{border-radius:0 14px 14px 0}.status{width:42px;height:42px;border-radius:14px;border:2px solid #e5e7ef;background:#f2f4f7;margin:0 2px;font-weight:900}.greenbtn.on{background:var(--good);border-color:#55d49a;color:#087443}.yellowbtn.on{background:var(--mid);border-color:#f2c94c;color:#946200}.redbtn.on{background:var(--bad);border-color:#f97066;color:#b42318}.profile{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:white;border:1px solid var(--line);border-radius:18px;padding:14px 18px;text-align:center;min-width:94px}.stat b{font-size:25px;display:block}.toast{position:fixed;right:20px;bottom:20px;background:#172033;color:white;border-radius:999px;padding:14px 18px;opacity:0;transition:.2s;box-shadow:var(--shadow)}.toast.show{opacity:1}.mobile{display:none}
@media(max-width:900px){.app{display:block}aside{display:none}main{padding:18px 14px 88px}.grid,.grid5,.profile{grid-template-columns:1fr}.students{grid-template-columns:1fr 1fr}h1{font-size:29px}.mobile{display:flex;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);padding:8px;gap:6px}.mobile button{flex:1;border:0;background:transparent;border-radius:14px;padding:10px 4px}.mobile button.active{background:var(--soft);font-weight:900;color:#3142aa}}
</style>
</head>
<body><div id="root"></div><div id="toast" class="toast">Gespeichert</div>
<script>
let view='start',role='Stufenleitung',subject=null,pupil=null,klasse=null;
const pupils=[['david','David N.','David Navaratnam','5d','d','Juliane'],['noah','Noah M.','Noah Müller','5a','a','Nicole'],['anna','Anna K.','Anna Keller','5b','b','Dagmar'],['lea','Lea S.','Lea Schneider','5c','c','Peter'],['mira','Mira T.','Mira Tuna','5e','e','Julia'],['max','Max W.','Max Weber','5d','d','Juliane'],['lina','Lina F.','Lina Fischer','5d','d','Juliane'],['tim','Tim B.','Tim Becker','5a','a','Nicole']];
const subjects={'Englisch':['Kernfächer',{'Grammatik':['Simple Present anwenden','Fragen bilden','Kurzformen von to be anwenden'],'Schreiben':['Über Alltag schreiben'],'Lesen':['Informationen entnehmen']}],'Deutsch':['Kernfächer',{'Lesen':['Sachtexten Informationen entnehmen'],'Schreiben':['Text planen']}],'Mathematik':['Kernfächer',{'Daten':['Diagramme lesen und beschreiben'],'Zahlen':['Mit Größen rechnen']}],'WBS':['Werkstatt',{'Wirtschaft':['Kostenarten unterscheiden','Kosten berechnen','Diagramme analysieren'],'Berufsorientierung':['Berufe recherchieren']}],'Biologie':['Werkstatt',{'Naturwissenschaftlich arbeiten':['Versuche beschreiben','Beobachtungen protokollieren']}],'Physik':['Werkstatt',{'Messen':['Messwerte erfassen'],'Auswerten':['Ergebnisse darstellen']}],'Technik':['Werkstatt',{'Sicherheit':['Werkzeuge sicher nutzen'],'Konstruktion':['Modell planen']}],'AES':['Werkstatt',{'Praxis':['Arbeitsabläufe planen'],'Nachweis':['Küchenregeln einhalten']}],'Informatik & Medienpädagogik':['Werkstatt',{'Medien':['Dateien sinnvoll organisieren'],'Programmieren':['einfache Befehle erklären']}],'Geschichte':['Werkstatt',{'Quellen':['Quellen untersuchen']}],'Geografie':['Werkstatt',{'Karten':['Karten Informationen entnehmen']}],'Gemeinschaftskunde':['Werkstatt',{'Demokratie':['Mitbestimmung erklären']}],'Gitarre':['Clubs',{'Teilnahme & Engagement':['regelmäßig teilgenommen','engagiert mitgearbeitet']}],'Garten':['Kreativband/Labore',{'Praxis':['Werkzeuge verantwortungsvoll nutzen']}],'Robotik':['Kreativband/Labore',{'Labor':['Sensoren testen','Roboter steuern']}]} ;
let ratings=JSON.parse(localStorage.getItem('kompass_ratings_v12')||'{}');
function key(c,p){return c+'|'+p}function save(){localStorage.setItem('kompass_ratings_v12',JSON.stringify(ratings))}function rate(c,p,v){ratings[key(c,p)]=v;save();toast();render()}function toast(){let t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),850)}
function shell(c){root.innerHTML='<div class="app"><aside><div class="logo">Kompass</div><div class="sub">Online-Demo · v1.2</div><div class="role"><div class="mini">Rolle</div><select onchange="role=this.value;render()"><option '+sel('Lehrkraft')+'>Lehrkraft</option><option '+sel('Stufenleitung')+'>Stufenleitung</option><option '+sel('Admin')+'>Admin</option></select></div><div class="nav">'+nav('start','Start')+nav('years','Jahrgänge')+nav('students','Schülerdatenbank')+nav('matrix','Kompetenzmatrix')+nav('catalog','Kompetenzkatalog')+nav('reports','Auswertungen')+'</div></aside><main>'+c+'</main></div><div class="mobile">'+mnav('start','Start')+mnav('years','Jg.')+mnav('students','SuS')+mnav('matrix','Matrix')+mnav('reports','Stats')+'</div>'}
function sel(x){return role==x?'selected':''}function nav(v,t){if(v=='catalog'&&role=='Lehrkraft')return '';return '<button class="'+(view==v?'active':'')+'" onclick="go(\''+v+'\')">'+t+'</button>'}function mnav(v,t){return '<button class="'+(view==v?'active':'')+'" onclick="go(\''+v+'\')">'+t+'</button>'}function go(v){view=v;subject=null;pupil=null;klasse=null;render()}function head(t,h){return '<h1>'+t+'</h1><div class="hint">'+h+'</div>'}
function render(){if(view=='start')start();if(view=='years')years();if(view=='students')students();if(view=='matrix')matrix();if(view=='catalog')catalog();if(view=='reports')reports()}
function start(){shell(head('Hallo Juliane','Kompass bündelt Jahrgänge, Schülerdatenbank und Kompetenzentwicklung.')+'<div class="grid"><button class="card tile" onclick="go(\'matrix\')"><b>Kompetenzmatrix</b><span>Fach öffnen, Bereich auswählen, bewerten.</span></button><button class="card tile" onclick="go(\'students\')"><b>Schülerdatenbank</b><span>David N. und weitere Lernprofile.</span></button><button class="card tile" onclick="go(\'years\')"><b>Jahrgänge 5–10</b><span>Admin- und Stufenleitungsübersicht.</span></button></div><div class="section">Klassenfarben</div>'+classgrid(5)+'<div class="section">Rollen</div><div class="grid"><div class="card"><h2>Lehrkraft</h2><p>Bewertet Kompetenzen und sieht eigene Gruppen.</p></div><div class="card"><h2>Stufenleitung</h2><p>Legt Kompetenzen an und bearbeitet Kataloge.</p></div><div class="card"><h2>Admin</h2><p>Verwaltet Jahrgänge, Benutzer und Schülerdatenbank.</p></div></div>')}
function classgrid(y){return '<div class="grid5">'+['a','b','c','d','e'].map((x,i)=>'<button class="card tile klasse '+x+'" onclick="klasse=\''+y+x+'\';view=\'students\';render()"><b>'+y+x+'</b><span>'+['Blau','Rot','Gelb','Violett','Grün'][i]+'</span></button>').join('')+'</div>'}
function years(){let h=head('Jahrgänge','Admin sieht alle Jahrgänge 5–10. Stufenleitungen sehen ihren Bereich.')+'<div class="grid">';for(let y=5;y<=10;y++)h+='<button class="card tile" onclick="shell(head(\'Jahrgang '+y+'\',\'Klassenübersicht\')+classgrid('+y+'))"><b>Jahrgang '+y+'</b><span>Klassen und Lerngruppen öffnen</span></button>';shell(h+'</div>')}
function filtered(){return klasse?pupils.filter(p=>p[3]==klasse):pupils}
function students(){if(pupil){studentprofile();return}shell(head(klasse?'Klasse '+klasse:'Schülerdatenbank','Kurznamen, Klassenfarben und Lernprofile.')+(klasse?'<button class="chip" onclick="klasse=null;render()">alle anzeigen</button>':'')+'<div class="students">'+filtered().map(p=>'<div class="card" onclick="pupil=\''+p[0]+'\';render()" style="cursor:pointer"><span class="dot '+p[4]+'"></span><b>'+p[1]+'</b><p>'+p[3]+' · Lerncoach: '+p[5]+'</p></div>').join('')+'</div>')}
function studentprofile(){let p=pupils.find(x=>x[0]==pupil);shell(head(p[1],'Lernprofil · '+p[3]+' · Lerncoach: '+p[5])+'<button class="chip" onclick="pupil=null;render()">← zurück</button><div class="profile"><div class="card"><h2>'+p[2]+'</h2><p>Anzeige in Übersichten: '+p[1]+'</p><div class="section">Lernbereiche</div><div class="grid"><div class="card"><h2>Kernfächer</h2><p>Deutsch · Mathematik · Englisch</p></div><div class="card"><h2>Werkstatt</h2><p>WBS · Bio · Technik · AES...</p></div><div class="card"><h2>Clubs & Labore</h2><p>Teilnahme und Engagement</p></div></div></div><div class="card"><h2>Status</h2><div class="stats"><div class="stat"><b>18</b>grün</div><div class="stat"><b>7</b>gelb</div><div class="stat"><b>2</b>rot</div></div></div></div>')}
function matrix(){if(!subject){let h=head('Kompetenzmatrix','Zuerst Lernbereich und Fach auswählen. Dann erst erscheinen Bereiche und Kompetenzen.');['Kernfächer','Werkstatt','Kreativband/Labore','Clubs'].forEach(g=>{h+='<div class="section">'+g+'</div><div class="grid">'+Object.keys(subjects).filter(s=>subjects[s][0]==g).map(s=>'<button class="card tile" onclick="subject=\''+s+'\';render()"><b>'+s+'</b><span>'+Object.values(subjects[s][1]).flat().length+' Kompetenzen · öffnen</span></button>').join('')+'</div>'});shell(h);return}let areas=subjects[subject][1],h=head(subject,'Bewertungen bleiben sichtbar markiert.')+'<button class="chip" onclick="subject=null;render()">← Fächerübersicht</button><span class="chip dark">'+subjects[subject][0]+'</span>';Object.keys(areas).forEach(a=>{h+='<div class="card"><h2>'+a+'</h2><div class="matrixwrap"><table><tr><th>Kompetenz</th>'+pupils.map(p=>'<th><span class="dot '+p[4]+'"></span><br>'+p[1]+'</th>').join('')+'</tr>';areas[a].forEach(c=>h+='<tr><td>'+c+'</td>'+pupils.map(p=>cell(c,p[0])).join('')+'</tr>');h+='</table></div></div>'});shell(h)}
function cell(c,p){let v=ratings[key(c,p)]||'';return '<td><button class="status greenbtn '+(v=='g'?'on':'')+'" onclick="rate(\''+c+'\',\''+p+'\',\'g\')">●</button><button class="status yellowbtn '+(v=='y'?'on':'')+'" onclick="rate(\''+c+'\',\''+p+'\',\'y\')">●</button><button class="status redbtn '+(v=='r'?'on':'')+'" onclick="rate(\''+c+'\',\''+p+'\',\'r\')">●</button></td>'}
function catalog(){let h=head('Kompetenzkatalog','Stufenleitungen und Admins können Kompetenzen anlegen und bearbeiten.')+'<button class="chip dark">+ Kompetenz anlegen</button>';Object.keys(subjects).forEach(s=>h+='<div class="card"><h2>'+s+'</h2><p>'+subjects[s][0]+' · Bereiche: '+Object.keys(subjects[s][1]).join(', ')+'</p></div>');shell(h)}
function reports(){shell(head('Auswertungen','Überblick für Stufenleitung, Fachschaften und LEG.')+'<div class="grid"><div class="card"><h2>Englisch</h2><p>72 % bewertet</p></div><div class="card"><h2>Werkstatt</h2><p>64 % bewertet</p></div><div class="card"><h2>Offene Pflichtkompetenzen</h2><p>5 SuS ohne Bewertung bei Diagramme analysieren.</p></div></div>')}
render()
</script></body></html>
